ges"],"reference":"Judges 15:15","reference_uk":"Книга Суддiв 15:15","ogienko":{"loc":"Книга Суддiв 15:15","text":"І знайшов він свіжу осля́чу ще́лепу, і простяг свою руку й узяв його, та й побив ним тисячу чоловіка. І сказав Самсон: „Осля́чою цією ще́лепою дійсно поклав їх на ку́пу, — осля́чою цією ще́лепою тисячу люда побив я“. І сталося, як скінчи́в він це говорити, то кинув ту ще́лепу зо своєї руки, і назвав ім'я́ тому місцю: Рамат-Лехі.[19] І сильно він спрагнув, і кли́кнув до Господа та й сказав: „Ти дав у руку Свого раба це велике спасі́ння, а тепер я помру́ від пра́гнення, і впаду́ в руку необрі́заних“. І пробив Бог джере́ло,[20] що в Лехі, і вийшла з ньо́го вода, — і він напився, і вернувся його дух, і він ожив. Тому назвав він ім'я́ йому́: Ен-Гаккоре,[21] що в Лехі, і так воно зветься аж до цього дня."},"wrongAnswers":["Залізний спис","Дерев’яний кий","Кам’яна брила"],"gameTopic":"judges_kings","ladderStep":3},{"question":"Скільки років було Давидові, коли його помазали на царя над усім Ізраїлем?","answer":30,"categories":["old_testament","kings_judges"],"reference":"2 Samuel 5:4","reference_uk":"2-а Самуїлова 5:4","ogienko":{"loc":"2-а Самуїлова 5:4","text":"Давид був віку тридцяти літ, коли став царюва́ти, і сорок літ царюва́в він. У Хевро́ні царював він над Юдою сім літ і шість місяців, а в Єрусалимі царював тридцять і три роки над усім Ізраїлем та Юдою. І пішов цар та люди його до Єрусалиму на Євусе́янина, ме́шканця того Кра́ю. А той сказав Давидові, говорячи: „Ти не вві́йдеш сюди, хіба́ повиганя́єш сліпих та кривих!“ А це значить: Давид ніко́ли не вві́йде сюди! Та Давид здобу́в тверди́ню Сіон, — він став Дави́довим Мі́стом. І сказав Давид того дня: „Кожен, хто заб'є євусе́янина, нехай скине до кана́лу, а з ним і кривих та сліпих“, зненави́джених для Давидової душі. Тому говорять: „Сліпий та кривий не вві́йде до дому!“"},"wrongAnswers":["28","35","40"],"gameTopic":"judges_kings","ladderStep":7},{"question":"Окрім Петра та Івана, який з учнів був при Преображенні Ісуса?","answer":"Яків","categories":["new_testament","gospels","miracles"],"reference":"Matthew 17:1-2, Mark 9:2, Luke 9:28-29","reference_uk":"Вiд Матвiя 17:1","ogienko":{"loc":"Вiд Матвiя 17:1","text":"А через шість день забирає Ісус Петра, і Якова, і Івана, брата його, та й веде їх осі́бно на го́ру високу. І Він перед ними переобрази́вся:[70] обличчя Його, як те сонце, зася́ло, а одежа Його стала біла, як світло. І ось з'явились до них Мойсей та Ілля́, і розмовляли із Ним. І озвався Петро та й сказав до Ісуса: „Господи, до́бре бути нам тут! Коли хочеш, поста́влю оту́т три шатра: для Тебе одне, і одне для Мойсея, і одне для Іллі“. Як він ще говорив, ось хмара ясна заслони́ла їх, і ось голос із хмари почувсь, що казав: „Це Син Мій Улю́блений, що Його Я вподо́бав. Його слухайтеся!“"},"wrongAnswers":["Андрій","Філіп","Фома"],"gameTopic":"gospels","ladderStep":8},{"question":"У Дамаску кому Анаанія повернув зір?","answer":"Савл","categories":["new_testament","miracles"],"reference":"Acts 9:17-18","reference_uk":"Дiї 9:17","ogienko":{"loc":"Дiї 9:17","text":"І Ананій пішов, і до дому ввійшов, і руки поклавши на нього, промовив: „Са́вле брате, Господь Ісус, що з'явився тобі на дорозі, якою ти йшов, послав ось мене, щоб став ти видю́щий, і напо́внився Духа Святого!“ І хвилі тієї відпала з очей йому ніби луска́, і зараз видю́щий він став... І, вставши, охристився, і, прийнявши поживу, на силах зміцнів. І він зараз зачав у синагогах звіщати про Ісуса, що Він — Божий Син, І дивом усі дивувалися, хто чув, і говорили: „Хіба це не той, що переслідував в Єрусалимі визна́вців оцього Ім'я́, та й сюди не на те він прибув, щоб отих пов'язати й приве́сти до первосвящеників?“"},"wrongAnswers":["Варнава","Корнилій","Степан"],"gameTopic":"miracles","ladderStep":4},{"question":"Скільки річок утворилося з річки, що виходила з Едену?","answer":4,"categories":["old_testament"],"reference":"Genesis 2:10 (Pishon, Gihon, Hiddekel, and Euphrates)","reference_uk":"Буття 2:10","ogienko":{"loc":"Буття 2:10","text":"І річка з Едену виходить, щоб поїти рай. І звідти розділюється і стає чотирма́ початками. Імення одному Пішон, — оточує він усю землю Хавіла, де є золото. А золото тієї землі добре; там бделій і камінь онікс. Ім'я́ ж другої річки Ґіхон, — вона оточує ввесь край Етіопії.[15] А ім'я річки третьої — Тигр, — вона протікає на сході Ашшуру.[16] А річка четверта — вона Ефрат."},"wrongAnswers":["3","5","6"],"gameTopic":"ot_general","ladderStep":8},{"question":"Як називалося місце, де Яків заснув і побачив сон про драбину до неба?","answer":"Бет-Ел","categories":["old_testament"],"reference":"Genesis 28:19","reference_uk":"Буття 28:19","ogienko":{"loc":"Буття 28:19","text":"І назвав він ім'я́ тому місцю: Бет-Ел,[77] а ймення того міста напочатку було Луз. І склав Яків обі́тницю, говорячи: „Коли Бог буде зо мною, і буде мене пильнувати на цій дорозі, якою ходжу́, і дасть мені хліба їсти та одежу вдягнутись, і я з миром вернуся до дому батька свого, то Госпо́дь буде мені Богом, і цей камінь, що я поставив за пам'ятника, буде домом Божим. І зо всього, що даси Ти мені, я, — щодо десятини, — дам десятину Тобі!“"},"wrongAnswers":["Шехем","Хеврон","Беер-Шева"],"gameTopic":"ot_general","ladderStep":8},{"question":"Хто наказав Нааманові сім разів умитися в Йордані, щоб зцілитися від прокази?","answer":"Єлисей","categories":["old_testament","prophets","miracles"],"reference":"2 Kings 5:10","reference_uk":"2-а царiв 5:10","ogienko":{"loc":"2-а царiв 5:10","text":"І послав Єлисей до нього посла, говорячи: „Іди, і ви́миєшся сім раз у Йорда́ні, і вигоїться тіло твоє тобі, — й очи́стишся“. І розгнівася Нааман, і пішов і сказав: „Ось я подумав був: він ви́йде до мене, і стане, і закличе Ім'я́ Господа, Бога свого, і покладе́ свою́ руку на те місце, і вилікує прокаже́ного... Чи ж не ліпші Авана та Парпар, дама́ські річки́, від усіх Ізраїлевих вод? Чи не міг я ви́митися в них, і стати чистим?“ І повернувся він, і пішов у гніві. І підійшли його раби, і говорили до нього, і сказали: „Батьку мій, коли б велику річ говорив тобі той пророк, чи ж ти не зробив би? А що ж, коли він сказав тобі тільки: Умийся — і будеш чистий!“ І зійшов він, і зану́рився в Йорда́ні сім раз, за словом Божого чоловіка. І сталося тіло його, як тіло мало́го хлопця, — і став він чистий!..."},"wrongAnswers":["Самуїл","Гезей","Ілля"],"gameTopic":"miracles","ladderStep":3},{"question":"Хто сповістив Захарію, що його дружина народить сина, якого назвуть Іваном Хрестителем?","answer":"Ангел Гавриїл","categories":["new_testament","gospels"],"reference":"Luke 1:13","reference_uk":"Вiд Луки 1:13","ogienko":{"loc":"Вiд Луки 1:13","text":"А ангол до нього промовив: „Не бійся, Захаріє, бо почута молитва твоя, і дружи́на твоя Єлисавета сина породить тобі, ти ж даси йому йме́ння Іван. І він буде на радість та втіху тобі, і з його наро́дження багато-хто втішаться. Бо він бу́де великий у Господа, „ні вина, ні п'янко́го напо́ю не питиме“, і напо́вниться Духом Святим ще з утро́би своєї матері. І багато синів із Ізраїля він наве́рне до їхнього Господа Бога. І він сам перед Ним буде йти в духу й силі Іллі, „щоб серця́ батьків приверну́ти до дітей“, і неслухняних — до мудрости праведних, щоб готових людей споряди́ти для Господа“."},"wrongAnswers":["Михаїл","Глас із хмари","Єлисавета"],"gameTopic":"gospels","ladderStep":7},{"question":"Хто сказав: «А я та мій дім будемо служити Господові»?","answer":"Ісус Навин","categories":["old_testament"],"reference":"Joshua 24:15","reference_uk":"Ісус Навин 24:15","ogienko":{"loc":"Ісус Навин 24:15","text":"А якщо зле в оча́х ваших служити Господе́ві, виберіть собі сьогодні, кому будете служити, — чи бога́м, яким служили ваші батьки́, що по то́му боці Річки, та чи богам аморейським, що ви сидите́ в їхньому кра́ї. А я та дім мій будемо служити Господе́ві“. І відповів народ та й сказав: „Борони, нас Боже, покинути Господа, щоб служити іншим бога́м! Бо Господь, Бог наш, — Він Той, що вивів нас та наших батьків з єгипетського кра́ю, з дому ра́бства, і що зробив на наших оча́х ті великі знаме́на, і стеріг нас на всій дорозі, що нею ми ходили, і по всіх народах, що ми перейшли серед них. І повиганяв Господь усі народи та амореянина, ме́шканця цього кра́ю, перед нами. І ми бу́демо служити Господе́ві, бо Він — Бог наш“. І сказав Ісус до народу: „Ви не здолі́єте служити Господе́ві, бо Він — Бог святий, Бог ревнивий Він. Не про́стить Він вашу провину та ваших гріхів."},"wrongAnswers":["Мойсей","Йосія","Самуїл"],"gameTopic":"ot_general","ladderStep":6},{"question":"Що означає ім’я Еммануїл?","answer":"З нами Бог","categories":["new_testament","gospels","miracles"],"reference":"Matthew 2:23","reference_uk":"Вiд Матвiя 2:23","ogienko":{"loc":"Вiд Матвiя 2:23","text":"А прибувши, оселився у місті, на ім'я́ Назаре́т, щоб збулося пророками сказане, що Він Назаряни́н буде зва́ний.[7]"},"wrongAnswers":["Бог із нами","Спаситель світу","Цар Ізраїля"],"gameTopic":"gospels","ladderStep":2},{"question":"Бог випробував Авраама, звелівши принести в цілопалення єдиного сина. Хто цей син?","answer":"Ісак","categories":["old_testament"],"reference":"Genesis 22:2","reference_uk":"Буття 22:2","ogienko":{"loc":"Буття 22:2","text":"І промовив Господь: „Візьми свого сина, свого одинака́, що його полюбив ти, Ісака, та й піди собі до краю Морія, і принеси там його в цілопа́лення на одній із тих гір, що про неї скажу́ тобі“. І встав Авраам рано вранці, і свого осла осідлав; і взяв із собою двох слуг та Ісака, сина свого, і для цілопалення дров нарубав. І встав, і пішов він до місця, що про нього сказав йому Бог. А третього дня Авраам звів очі свої, та й побачив те місце здалека. І сказав Авраам своїм слугам: „Сідайте собі тут з ослом, а я й хлопець пі́дем аж туди, і покло́нимося, і повернемося до вас“. І взяв Авраам дро́ва для цілопа́лення, і поклав на Ісака, сина свого, і взяв в свою руку огонь та ножа, і пішли вони ра́зом обоє."},"wrongAnswers":["Ізмаїл","Ісав","Левій"],"gameTopic":"ot_general","ladderStep":1},{"question":"За скільки срібняків Юда зрадив Ісуса?","answer":30,"categories":["new_testament","gospels"],"reference":"Matthew 26:15","reference_uk":"Вiд Матвiя 26:15","ogienko":{"loc":"Вiд Матвiя 26:15","text":"і сказав: „Що́ хочете дати мені, — і я вам Його видам?“ І вони йому виплатили тридцять срібняків.[93] І він відтоді шукав слу́шного ча́су, щоб видати Його. А першого дня Опрі́сноків учні підійшли до Ісуса й сказали Йому: „Де́ хочеш, щоб ми приготува́ли пасху спожити Тобі? А Він відказав: „Ідіть до такого то в місто, і перекажіть йому: каже Вчитель: час Мій близьки́й, — справлю Пасху з Своїми учнями в тебе“. І учні зробили, як звелів їм Ісус, і зачали́ пасху готува́ти."},"wrongAnswers":["20","15","40"],"gameTopic":"gospels","ladderStep":1},{"question":"Хто особисто охрестив більше людей — Ісус чи Іван Хреститель?","answer":"Іван Хреститель","categories":["new_testament","gospels"],"reference":"John 4:2","reference_uk":"Вiд Івана 4:2","ogienko":{"loc":"Вiд Івана 4:2","text":"хоч Ісус не христив Сам, а учні Його, Він покинув Юде́ю та зно́ву пішов у Галіле́ю. І потрібно було́ Самарі́ю Йому перехо́дити. Отож, прибуває Він до самарі́йського міста, що зветься Сіха́р, недалеко від поля, яке Яків був дав своєму синові Йо́сипові. Там же була Яковова криниця. І Ісус, дорогою змо́рений, сів отак край криниці. Було коло години десь шостої.[4]"},"wrongAnswers":["Ісус","Пилип","Андрій"],"gameTopic":"gospels","ladderStep":5},{"question":"Хто був свідком, коли Іллю взяли на небо?","answer":"Єлисей","categories":["old_testament","prophets","miracles"],"reference":"2 Kings 2:11-12","reference_uk":"2-а царiв 2:11","ogienko":{"loc":"2-а царiв 2:11","text":"І сталося, як вони все йшли та говорили, аж ось появився огняни́й віз та огняні́ коні, і розлучи́ли їх одного від о́дного. І возні́сся Ілля в ви́хрі на небо... А Єлисей це бачив, і він закричав: „Ба́тьку мій, ба́тьку мій, во́зе Ізраїлів та верхівці́ його!“ Та вже не побачив його... І схопи́вся він сильно за одежу свою та й роздер її на дві части раїлі пророк, як Мойсей, що знав його Господь обличчя-в-обличчя,"},"wrongAnswers":["Ісус Навин","Елеазар","Фінеес"],"gameTopic":"manna_desert","ladderStep":9},{"question":"Скільки років Ізраїлеві сини перебували в єгипетській неволі? (Вихід 12:40)","answer":430,"categories":["old_testament","exodus"],"reference":"Exodous 12:40-41","reference_uk":"Вихід 12:40","ogienko":{"loc":"Вихід 12:40","text":"А перебува́ння Ізраїлевих синів, що сиділи в Єгипті, — чотириста років і тридцять років. І сталося в кінці чотирьохсот років і тридцяти років, і сталося саме того дня, — вийшли всі Господні війська[21] з єгипетського кра́ю. Це ніч сторо́жі для Господа, бо Він вивів їх з єгипетського кра́ю. Ця сама ніч — сторо́жа для Господа всім синам Ізраїля на їхні поколі́ння. І сказав Господь до Мойсея й до Аарона: „Це постанова про Пасху: жоден чужи́нець не бу́де їсти її. А кожен раб лю́дський, ку́плений за срібло, коли обріжеш його, тоді він буде їсти її."},"wrongAnswers":["400","360","450"],"gameTopic":"manna_desert","ladderStep":7},{"question":"Дізнавшись про лихо, що спіткало Йова, скільки його друзів прийшло втішати його?","answer":3,"categories":["old_testament"],"reference":"Job 2:11","reference_uk":"Йов 2:11","ogienko":{"loc":"Йов 2:11","text":"І почули троє при́ятелів Йо́вових про все те нещастя, що прийшло на нього, і поприхо́дили кожен з місця свого: теманя́нин Еліфа́з, шух'я́нин Бідда́д та наама́тянин Цофа́р. І вмовилися вони прийти ра́зом, щоб похитати головою над ним[4] та поті́шити його. І звели́ вони зда́лека очі свої, — і не пізна́ли його. І підне́сли вони голос свій, та й заголоси́ли, і розде́рли кожен одежу свою, і кидали по́рох над своїми головами аж до неба. І сиділи вони з ним на землі сім день та сім ноче́й, і ніхто не промо́вив до нього ні слова, бо вони ба́чили, що біль його ве́льми великий"},"wrongAnswers":["2","4","5"],"gameTopic":"ot_general","ladderStep":5},{"question":"Хто єдина жінка, названа на ім’я в листі Павла до Филимона?","answer":"Апфія","categories":["new_testament"],"reference":"Philemon 2","reference_uk":"До Филимона 1:2","ogienko":{"loc":"До Филимона 1:2","text":"і сестрі любій Апфі́ї, і співвойо́вникові нашому Архи́пові, і Церкві домашній твоїй:"},"wrongAnswers":["Марія","Нимфа","Лідія"],"gameTopic":"nt_general","ladderStep":10},{"question":"У яку пору дня Ісус сів на човен, з якого втихомирив бурю?","answer":"Надвечір","categories":["new_testament","gospels","miracles"],"reference":"Mark 4:35","reference_uk":"Вiд Марка 4:35","ogienko":{"loc":"Вiд Марка 4:35","text":"І сказав Він до них того дня, коли вечір настав: „Перепли́ньмо на той бік“. І, лишивши наро́д, узяли із собою Його, як у чо́вні Він був; і інші човни́ були з Ним. І зняла́ся ось буря велика, а хвилі вливалися в чо́вен, аж чо́вен водою вже був перепо́внився! А Він спав на кормі́ на подушці... І вони розбудили Його та й сказали Йому: „Учителю, чи Тобі байдуже́, що ми гинемо?“ Тоді Він устав, і вітрові заборонив, і до моря сказав: „Мовчи, перестань!“ І стих вітер, — і тиша велика настала."},"wrongAnswers":["На світанку","Опівдні","Перед полуднем"],"gameTopic":"gospels","ladderStep":9},{"question":"Після навернення скільки років Павло провів у Аравії, перш ніж розпочати своє служіння?","answer":3,"categories":["new_testament"],"reference":"Galatians 1:18","reference_uk":"До галатiв 1:18","ogienko":{"loc":"До галатiв 1:18","text":"По трьох ро́ках пото́му пішов я в Єрусалим побачити Ки́фу, і в нього пробув днів із п'ятнадцять. А іншого з апо́столів я не бачив, крім Якова, брата Господнього. А що вам пишу́, ось кажу́ перед Богом, що я не обманюю! Пото́му пішов я до си́рських та кілікі́йських країн. Церква́м же Христовим в Юдеї я знаний не був особисто, -"},"wrongAnswers":["1","2","5"],"gameTopic":"nt_general","ladderStep":10},{"question":"Скільки воїнів втратив Сеннахерів під час облоги Єрусалима?","answer":185000,"categories":["old_testament","kings_judges"],"reference":"2 Kings 19:35","reference_uk":"2-а царiв 19:35","ogienko":{"loc":"2-а царiв 19:35","text":"І сталося тієї ночі, і вийшов Ангол Господній, і забив в асирійському табо́рі сто й вісімдеся́т і п'ять тисяч. І повставали вони рано вранці, аж ось — усі мертві тру́пи! А Санхерів, асирійський цар, рушив та й пішов, і вернувся й осівся в Ніневі́ї. І сталося, коли він молився в домі Нісроха, свого бога, то Адраммелех та Шар'ецер убили його мече́м, а самі втекли́ до кра́ю Арара́т. А замість нього зацарював син його Есар-Хаддон."},"wrongAnswers":["170000","200000","150000"],"gameTopic":"judges_kings","ladderStep":9},{"question":"Хто був батьком Івана Хрестителя?","answer":"Захарій","categories":["new_testament","gospels"],"reference":"Luke 3:2","reference_uk":"Вiд Луки 3:2","ogienko":{"loc":"Вiд Луки 3:2","text":"за первосвящеників Анни й Кайя́фи було Боже слово в пустині Іванові, сину Захарія. І він перейшов усю землю Йорда́нську, проповідуючи хрищення покая́ння для про́щення гріхів, як написано в книзі пророцтва пророка Ісаї: „Голос того, хто кличе: У пустині готуйте дорогу для Господа, рівняйте стежки́ Йому! Нехай кожна долина напо́вниться, гора ж кожна та при́горок зни́зиться, що нерівне, нехай випросто́вується, а доро́ги вибо́їсті стануть гладе́нькі, — і кожна люди́на побачить Боже спасі́ння!“"},"wrongAnswers":["Єлеазар","Симеон","Йоїяда"],"gameTopic":"gospels","ladderStep":3},{"question":"Скільки бісів вийшло з Марії, званої Магдалинкою?","answer":7,"categories":["new_testament","gospels","miracles"],"reference":"Luke 8:2","reference_uk":"Вiд Луки 8:2","ogienko":{"loc":"Вiд Луки 8:2","text":"та дехто з жіно́к, що були́ вздоро́влені від злих ду́хів і хвороб: Марія, Магдали́ною[18] звана, що з неї сім де́монів вийшло, і Іва́нна, дружи́на Ху́дзи, урядника Іродового, і Суса́нна, і інших багато, що маєтком своїм їм служили. І, як зібралось багато наро́ду, і з міста до Нього поприхо́дили, то Він промовляти став притчею. „Ось вийшов сіяч, щоб посіяти зе́рно своє. І, як сіяв, упало одне край дороги, — і було повито́птуване, а птахи небесні його повидзьо́бували. Друге ж упало на ґрунт кам'яни́стий, — і, зійшовши, усохло, не мало бо во́гкости."},"wrongAnswers":["5","6","12"],"gameTopic":"gospels","ladderStep":5},{"question":"Коли натовп виходив христитися, як Іван Хреститель охарактеризував їх?","answer":"Роде зміїний","categories":["new_testament","gospels"],"reference":"Luke 3:7","reference_uk":"Вiд Луки 3:7","ogienko":{"loc":"Вiд Луки 3:7","text":"А Іван говорив до людей, хто прихо́див, христитися в ньо́го: Ро́де зміїний, — хто навчив вас тікати від гніву майбу́тнього? Отож, учиніть гідний плід покая́ння. І не починайте казати в собі: „Маємо ба́тька Авраама“. Бо кажу вам, що Бог може підне́сти дітей Авраамові з цьо́го каміння. Бо вже он до корі́ння дере́в і сокира прикла́дена: кожне ж дерево, що доброго пло́ду не родить, буде зрубане та до огню буде вкинене“. А люди питали його й говорили: „Що́ ж нам робити?“ І сказав він у відповідь їм: „У кого дві сорочці, — нехай дасть немаючому; а хто має поживу, — нехай робить так само“."},"wrongAnswers":["Діти Авраама","Сини світла","Народ Ізраїля"],"gameTopic":"gospels","ladderStep":3},{"question":"З якого коліна Ізраїля походив апостол Павло?","answer":"Веніямин","categories":["new_testament"],"reference":"Philippians 3:5","reference_uk":"До филип'ян 3:5","ogienko":{"loc":"До филип'ян 3:5","text":"обрізаний восьмого дня, з роду Ізраїля, з племени Веніяминового, єврей із євреїв, фарисей за Законом. Через горли́вість я був переслідував Церкву, бувши невинний, щодо праведности в Законі. Але те, що́ для мене було́ за надба́ння, те ради Христа я за втрату вважав. Тож усе я вважаю за втрату ради переважного позна́ння Христа Ісуса, мого Господа, що я ради Нього відмовився всьо́го, і вважаю все за сміття́, щоб придбати Христа, щоб знайтися в Нім не з власною праведністю, яка від Зако́ну, але з тією, що з віри в Христа, праведністю від Бога за вірою,"},"wrongAnswers":["Юда","Левій","Єфрем"],"gameTopic":"nt_general","ladderStep":9},{"question":"Хто доручив Павлові проповідувати язичникам?","answer":"Ісус","categories":["new_testament"],"reference":"Acts 26:17","reference_uk":"Дiї 26:17","ogienko":{"loc":"Дiї 26:17","text":"Визволяю тебе від твого наро́ду та від поган, до яких Я тебе посилаю, — відкрити їм очі, щоб вони наверну́лись від те́мряви в світло та від сатани́ної вла́ди до Бога, щоб вірою в Мене отримати їм дарува́ння гріхів і насліддя з освяченими“. Через це я, о ца́рю Агріппо, не був супротивний видінню небесному, але ме́шканцям перше Дамаску, потім Єрусалиму й усякого кра́ю юдейського та поганам я проповідував, щоб пока́ялися й наверну́лись до Бога, і чинили діла, гі́дні покая́ння. Через це юдеї в святині схопи́ли мене та й хотіли роздерти."},"wrongAnswers":["Петро","Яків","Святий Дух"],"gameTopic":"nt_general","ladderStep":10},{"question":"Хто був царем Ізраїля, коли Давид переміг Голіафа?","answer":"Саул","categories":["old_testament","kings_judges"],"reference":"1 Samuel 17","reference_uk":"1-а Самуїлова 17:1","ogienko":{"loc":"1-а Самуїлова 17:1","text":"І зібрали филисти́мляни свої ві́йська на війну. І зібралися вони до Сохо, що Юдине, і таборува́ли між Сохо та між Азекою в Ефес-Даммімі. І зібра́лися Саул та ізра́їльтяни, і таборува́ли в долині Елі, і вставилися до бо́ю проти филисти́млян. І стояли филисти́мляни на горі з того боку, а Ізраїль стояв на горі з цього боку, а поміж ними долина. І вийшов із филистимських табо́рів однобо́рець, ім'я́ йому Ґолія́т із Ґату. Високий був — шість ліктів і п'ядь. А на голові його — мідяний шоло́м, і він одя́гнений був у па́нцера з луски́; а вага того па́нцера — п'ять тисяч шеклів міді."},"wrongAnswers":["Давид","Соломон","Ісбосет"],"gameTopic":"judges_kings","ladderStep":4},{"question":"Кому Бог описав Йова як досконалого й праведного чоловіка?","answer":"Сатана","categories":["old_testament"],"reference":"Job 1:8","reference_uk":"Йов 1:8","ogienko":{"loc":"Йов 1:8","text":"І сказав Господь до сатани: „Чи звернув ти увагу на раба Мого́ Йова? Бо немає такого, як він, на землі: муж він невинний та праведний, що Бога боїться, а від злого втікає“. І відповів сатана́ Господе́ві й сказав: „Чи ж Йов да́рмо боїться Бога? Чи ж Ти не забезпе́чив його, і дім його, і все, що його? Чин його рук Ти поблагослови́в, а маєток його поши́рився по кра́ю. Але простягни тільки руку Свою, і доторкни́ся до всього, що його, — чи він не знева́жить Тебе перед лицем Твоїм?“ І сказав Господь до сатани́: „Ось усе, що його́, — у твоїй руці, тільки на нього само́го не простягай своєї руки!“ І пішов сатана́ від лиця Господнього."},"wrongAnswers":["Йов","Йовові друзі","Йовові сини"],"gameTopic":"ot_general","ladderStep":5},{"question":"Хто сказав: «Срібла й золота немає в мене, а що маю, те даю тобі»?","answer":"Петро","categories":["new_testament","gospels","miracles"],"reference":"Acts 3:6","reference_uk":"Дiї 3:6","ogienko":{"loc":"Дiї 3:6","text":"Та промовив Петро: „Срібла й золота в мене нема, але що я маю, даю тобі: У Ім'я́ Ісуса Христа Назаряни́на — устань та й ходи!“ І, узявши його за прави́цю, він підвів його. І хвилі тієї зміцни́лися но́ги й сугло́бці його! І, зірвавшись, він устав та й ходив, і з ними у храм увійшов, ходячи та підскакуючи, і хвалячи Бога! Наро́д же ввесь бачив, як ходив він та Бога хвалив. І пізнали його, що це той, що при Красних воро́тях храму сидів ради милостині. І вони перепо́внились жа́хом та по́дивом із того, що́ сталось йому!"},"wrongAnswers":["Павло","Яків","Іван"],"gameTopic":"gospels","ladderStep":6},{"question":"Якова, брата Івана, вбили першим із апостолів. Як саме його стратили?","answer":"Мечем","categories":["new_testament","gospels"],"reference":"Acts 12:2","reference_uk":"Дiї 12:2","ogienko":{"loc":"Дiї 12:2","text":"І мечем він стяв Якова, брата Іванового. А бачивши, що подо́балося це юдеям, він задумав схопи́ти й Петра. Були ж дні Опрі́сноків. І, схопи́вши його, посадив до в'язниці, і передав чотирьом чвіркам воякі́в, щоб його стерегли, бажаючи вивести людям його по Па́сці. Отож, у в'язниці Петра стерегли, а Церква ре́вно молилася Богові за нього. А як Ірод хотів його ви́вести, Петро спав тієї ночі між двома́ вояка́ми, закутий у два ланцюги́, і сторо́жа пильнувала в'язницю при две́рях."},"wrongAnswers":["Камінням","На хресті","У в’язниці"],"gameTopic":"gospels","ladderStep":7},{"question":"Скільки років було Авраамові, коли народився Ісак?","answer":100,"categories":["old_testament"],"reference":"Genesis 21:5","reference_uk":"Буття 21:5","ogienko":{"loc":"Буття 21:5","text":"А Авраам був віку ста літ, як уродився йому Ісак, син його. І промовила Сарра: „Сміх учинив мені Бог, — кожен, хто почує, буде сміятися з мене“. І промовила: „Хто б сказав Авраамові: Сарра годує синів? Бо вродила я сина в старості його“. І дитина росла, і була відлучена. І справив Авраам велику гостину в день відлучення Ісака. І побачила Сарра сина Аґари єги́птянки, що вродила була Авраамові, що він насміхається."},"wrongAnswers":["90","110","85"],"gameTopic":"ot_general","ladderStep":7},{"question":"Який напис був на хресті Ісуса?","answer":"Цар юдейський","categories":["new_testament","gospels"],"reference":"Luke 24:38, John 19:19","reference_uk":"Вiд Луки 24:38","ogienko":{"loc":"Вiд Луки 24:38","text":"Він же промовив до них: „Чого́ ви стриво́жились? І пощо́ ті думки до серде́ць ваших входять? Погляньте на руки Мої та на ноги Мої, — це ж Я Сам! Доторкніться до Мене й дізнайтесь, — бо не має дух тіла й косте́й, а Я, бачите, маю“. І, промовивши це, показав Він їм руки та но́ги. І, як ще не йняли вони віри з радощів та дивувались, Він сказав їм: „Чи не маєте тут чогось їсти?“ Вони ж подали́ Йому ку́сника риби печеної та стільника́ медово́го."},"wrongAnswers":["Цар Ізраїля","Син Давидів","Цар Римський"],"gameTopic":"gospels","ladderStep":4},{"question":"Хто простягнув руку з жезлом над водами Єгипту, і вони стали кров’ю?","answer":"Аарон","categories":["old_testament","exodus","prophets","miracles"],"reference":"Exodus 7:19-20","reference_uk":"Вихід 7:19","ogienko":{"loc":"Вихід 7:19","text":"І сказав Господь до Мойсея: „Скажи Ааронові: Візьми свою па́лицю, і простягни́ свою руку над водою єги́птян, над їхніми річка́ми, над їхніми потоками, і над става́ми їхніми, і над кожним водозбором їхнім, — і вони стануть кров'ю. І буде кров по всій єгипетській землі, і в по́суді дерев'янім, і в каміннім.“ І Мойсей та Аарон зробили так, як наказав був Господь. І підняв він палицю, та й ударив во́ду, що в Річці, на очах фараона й на очах його рабів. І змінилася вся вода, що в Річці, на кров! А риби, що в Річці, погинули. І засмерділася Рі́чка, і не могли єги́птяни пити воду з Річки. І була кров у всім єгипетськім кра́ї. І так само зробили єгипетські чарівники́ своїми ча́рами. І стало запеклим фараонове серце, — і він не послухався їх, як говорив був Господь. І повернувся фараон, і ввійшов до до́му свого́, і не приклав він свого серця також до цього."},"wrongAnswers":["Мойсей","Фараон","Йосип"],"gameTopic":"manna_desert","ladderStep":8},{"question":"У якому місті вперше назвали учнів християнами?","answer":"Антіохія","categories":["new_testament"],"reference":"Acts 11:26","reference_uk":"Дiї 11:26","ogienko":{"loc":"Дiї 11:26","text":"А знайшовши, привів в Антіохі́ю. І збирались у Церкві вони цілий рік, і навчали багато народу, і в Антіохі́ї найперш християнами на́звано учнів. Прибули́ ж тими днями пророки від Єрусалиму до Антіохі́ї. І встав один з них, на йме́ння Ага́в, і Духом прорік, що голод великий у ці́лому світі настане, як за Кла́вдія був.[21] Тоді учні, усякий із своєї спроможности, постановили послати допомогу братам, що в Юдеї жили. Що й зробили, через руки Варнави та Са́вла, пославши до старших."},"wrongAnswers":["Єрусалим","Кесарія","Рим"],"gameTopic":"cities","ladderStep":7},{"question":"Коли Ісус ніс хрест, кого змусили нести його за Нього?","answer":"Симона з Киринеї","categories":["new_testament","gospels"],"reference":"Mark 15:21; Matthew 27:32","reference_uk":"Вiд Марка 15:21","ogienko":{"loc":"Вiд Марка 15:21","text":"І одного перехо́жого, що з поля вертався, Си́мона Кіріне́янина, батька Олександра та Ру́фа, змусили, щоб хреста Йому ніс. І Його привели́ на місце Голго́фу, що значить „Черепо́вище“. І давали Йому пити вина, із ми́ррою змішаного, але Він не прийня́в. І Його розп'яли́, і „поділили одежу Його, кинувши же́реб про неї“, хто що ві́зьме. Була́ ж третя[22] година, як Його розп'яли́."},"wrongAnswers":["Йосип Ариматеємський","Клеопа","Симон Киринеянин"],"gameTopic":"gospels","ladderStep":7},{"question":"Згідно з Об’явленням, що потрібно, щоб отримати вінець життя?","answer":"Бути вірним аж до смерті","categories":["new_testament"],"reference":"Revelations 2:10","reference_uk":"Об'явлення 2:10","ogienko":{"loc":"Об'явлення 2:10","text":"Не бійся того, що маєш страждати! Ось диявол вкидатиме декого з вас до в'язниць, щоб вас ви́пробувати. І будете мати біду́ десять день. Будь вірний до смерти, і Я тобі дам вінця́ життя! Хто має вухо, хай чує, що́ Дух промовляє Церква́м: переможець не буде пошко́джений від другої смерти“. А до ангола Церкви в Перга́мі напиши: „Оце каже Той, що має меча обосі́чного: Я знаю діла твої, і що де ти живеш, там престол сатани. І трима́єш ти Йме́ння Моє, і ти не відкинувся від віри Моєї навіть за днів, коли в вас, де живе сатана́, був убитий Анти́па,[5] свідок Мій вірний. Але трохи Я маю на тебе, бо маєш там тих, хто трима́ється науки Валаа́ма, що навчав був Бала́ка покласти спотика́ння перед синами Ізраїля, щоб їли ідольські жертви й розпу́сту чинили."},"wrongAnswers":["Постити сорок днів","Любити ворогів","Творити чудеса"],"gameTopic":"nt_general","ladderStep":5},{"question":"Яка водойма, окрім Червоного моря, розступилася в Біблії?","answer":"Річка Йордан","categories":["old_testament","prophets","exodus","miracles"],"reference":"By Joshua (Joshua 3:7-4:18), and by Elijah and Elisha (2 Kings 2: 2-8 and 13-14)","reference_uk":null,"ogienko":{"loc":"Ісус Навин 3:7-4:18","text":"І сказав Господь до Ісуса: „Цього дня розпічну́ Я звели́чувати тебе на оча́х усього Ізраїля, який буде бачити, що я́к був Я з Мойсеєм, так буду з тобою. А ти накажеш священикам, що носять ковчега заповіту, говорячи: Коли ви вві́йдете до кра́ю води Йорда́ну, станете в Йорда́ні“. І сказав Ісус до Ізра́їлевих синів: „Підійдіть сюди, і послухайте слів Господа, Бога вашого“. І Ісус сказав: „По цьому пізнаєте, що Бог Живий поміж вами, і конче Він вижене перед вами ханаане́янина, і хітте́янина, і хівве́янина, і періззе́янина, і ґірґаше́янина, і євусе́янина. Оце ковчег заповіту Владики всієї землі перехо́дить перед вами через Йорда́н. А тепер візьміть собі дванадцять мужі́в з Ізраїлевих племе́н, по одно́му му́жеві на пле́м'я. І станеться, коли спи́няться сто́пи ніг священиків, що носять ковчега Господа, Владики всієї землі, у воді Йорда́ну, буде спи́нена вода, що тече зве́рху, і стане одним валом“. І сталося, коли рушив наро́д зо своїх наметів, щоб перейти Йорда́н, а священики, що не́сли ковчега заповіту перед народом, і коли носії ковчегу прийшли до Йорда́ну, а ноги священиків, що несли ковчега, зану́рилися в во́ду скра́ю, а Йорда́н був повний по всі береги́ свої всі дні жнив, то спини́лась вода, що зве́рху текла́, стала одним ва́лом, дуже дале́ко від міста Ада́ма, що збоку Цортану, а та, що текла до сте́пу, до Солоного моря, стекла́ зо́всім, і була́ відділена, а народ перейшов навпроти Єрихо́ну. А священики, що не́сли ковчега заповіту Господнього, стали міцно на сухому посере́дині Йорда́ну, і ввесь Ізраїль перехо́див по сухому, аж поки не скінчи́в переходити Йорда́н увесь народ. І сталося, як увесь народ закінчи́в перехо́дити Йорда́н, то сказав Господь до Ісуса, говорячи: „Візьміть собі з народу дванадцять мужі́в, по одно́му му́жеві з пле́мени. І накажете їм, говорячи: Винесіть звідси, із сере́дини Йорда́ну, із місця, де міцно стояли ноги священиків, дванадцять ка́менів, і перенесе́те їх із собою, і покладете їх на нічлі́гу, що в ньому будете ночувати цієї ночі“. І покликав Ісус тих дванадцятьох мужів, що настановив з Ізраїлевих синів, по одному му́жеві з пле́мени, та й сказав їм Ісус: „Підіть перед ковче́гом Господа, Бога вашого, до сере́дини Йорда́ну, і підійміть собі кожен на плече́ своє одно́го ка́меня за числом племе́н Ізраїлевих синів, щоб то було́ знаком між вами, коли взавтра запитають ваші сини, говорячи: Що це в вас за камі́ння? то скажете їм, що була́ відді́лена йорда́нська вода перед ковчегом Господнього заповіту, — коли він перехо́див в Йорда́ні, була відді́лена йорда́нська вода. І будуть ті камі́ння за па́м'ятку для Ізра́їлевих синів аж навіки“. І зробили Ізра́їлеві сини так, як наказав Ісус, — і поне́сли вони дванадцять ка́менів із сере́дини Йорда́ну, як говорив Господь до Ісуса, за числом племен Ізраїлевих синів. І перене́сли їх із собою до нічлі́гу, та й поклали їх там. А інших дванадцять ка́менів поставив Ісус в сере́дині Йорда́ну на місці, де стояли но́ги священиків, що несли ковчега заповіту, — і вони там аж до дня цього. А священики, що не́сли ковчега, стояли в сере́дині Йорда́ну аж до закі́нчення всього, що Господь наказав був Ісусові сказати наро́дові, згідно з усім тим, що наказав був Мойсей Ісусові. А народ ква́пився і перехо́див. І сталося, як увесь народ скінчи́в перехо́дити, то перейшов Господній ковчег та священики перед наро́дом. І перейшли́ Руви́мові сини й сини Ґадові та половина пле́мени Манасі́їного, озбро́єні до бо́ю, перед Ізраїлевими синами, як Мойсей говорив був до них. Коло сорока тисяч озбро́єних вояків перейшли перед Господнім лицем на війну до єрихо́нських степі́в. Того дня звели́чив Господь Ісуса на оча́х усього Ізраїля, і стали боятися його, як боялися Мойсея по всі дні його життя. І сказав Господь до Ісуса, говорячи: „Накажи священикам, що носять ковче́га запові́ту, і нехай вони вийдуть з Йорда́ну“. І наказав Ісус священикам, говорячи: „Вийдіть з Йорда́ну!“"},"wrongAnswers":["Море Мертве","Річка Ніл","Море Галілейське"],"gameTopic":"manna_desert","ladderStep":9},{"question":"Який зріст був у Голіафа (за описом у Писанні)?","answer":"Шість ліктів і п’ядь","categories":["old_testament","kings_judges"],"reference":"1 Samuel 17:4","reference_uk":"1-а Самуїлова 17:4","ogienko":{"loc":"1-а Самуїлова 17:4","text":"І вийшов із филистимських табо́рів однобо́рець, ім'я́ йому Ґолія́т із Ґату. Високий був — шість ліктів і п'ядь. А на голові його — мідяний шоло́м, і він одя́гнений був у па́нцера з луски́; а вага того па́нцера — п'ять тисяч шеклів міді. А на нога́х його — мідяні наголі́нники, а за плечи́ма його — мідяний спис. А держа́к списа його — як ткацький вал, а ві́стря спи́су його — шістсот шеклів заліза. А перед ним ходив щитоно́ша. І став він, і кликнув до Ізраїлевих полків, та й сказав до них: „Чого ви вийшли ставати до бо́ю? Чи ж я не филисти́млянин, а ви не раби Саулові? Оберіть собі кого, і нехай він зі́йде до мене."},"wrongAnswers":["П’ять ліктів і п’ядь","Сім ліктів","Чотири лікті й п’ядь"],"gameTopic":"judges_kings","ladderStep":7},{"question":"Що, за словами Павла, є виконанням Закону?","answer":"Любов","categories":["new_testament"],"reference":"Romans 13:10","reference_uk":"До римлян 13:10","ogienko":{"loc":"До римлян 13:10","text":"Любов не чинить зла ближньому, тож любов — викона́ння Зако́ну. І це тому́, що знаєте час, що пора нам уже пробуди́тись від сну. Бо тепер спасі́ння ближче до нас, аніж тоді, коли ми ввірували. Ніч минула, а день набли́зився, тож відкиньмо вчинки те́мряви й зодягнімось у зброю світла. Як удень, поступаймо доброчесно, не в гульні та п'я́нстві, не в пере́любі та розпусті, не в сварні́ та за́здрощах, але зодягні́ться Господом Ісусом Христо́м, а дого́дження тілу не обе́ртайте на пожадли́вість!"},"wrongAnswers":["Прощення","Добрі Діла","Піст і молитва"],"gameTopic":"nt_general","ladderStep":6},{"question":"Яка найкоротший розділ в Біблії?","answer":"Псалом 117","categories":["old_testament"],"reference":"Psalm 117 (2 verses)","reference_uk":"Псалми 117:1","ogienko":{"loc":"Псалми 117:1","text":"Дякуйте Господу, добрий бо Він, бо навіки Його милосердя! Нехай скаже Ізраїль, бо навіки Його милосердя! Нехай скаже дім Ааро́нів, бо навіки Його милосердя! Нехай скажу
