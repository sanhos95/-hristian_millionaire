wer":"Авімелех","categories":["old_testament"],"reference":"Genesis 26: 1-9","reference_uk":"Буття 26:1","ogienko":{"loc":"Буття 26:1","text":"І настав був голод у Краю́, окрім голоду першого, що був за днів Авраамових. І пішов Ісак до Авімелеха, царя филистимського, до Ґерару. І явився йому Господь і сказав: „Не ходи до Єгипту, — оселися в землі, про яку Я скажу́ тобі. Оселися хвилево в землі тій, і Я буду з тобою, і тебе поблагословлю, бо тобі та наща́дкам твої́м дам усі оці землі. І Я виконаю присягу, що нею поклявся був Авраамові, батьку твоєму. І розмножу наща́дків твої́х, немов зорі на небі, і потомству твоєму Я дам усі оці землі. І поблагословляться в потомстві твоїм усі наро́ди землі, через те, що Авраам послухав Мого голосу, і виконував те, що виконувати Я звелів: заповіді Мої, постанови й закони Мої“."},"wrongAnswers":["Фараон","Авімелех персидський","Амрафел"],"gameTopic":"ot_general","ladderStep":8},{"question":"Три названі жінки знайшли гріб Ісуса відчиненим і порожнім: Марія Магдалина, Марія, мати Якова, і хто ще?","answer":"Іванна","categories":["new_testament","gospels","miracles"],"reference":"Luke 24:10","reference_uk":"Вiд Луки 24:10","ogienko":{"loc":"Вiд Луки 24:10","text":"То були́: Марія Магдали́на, і Іванна, і Марія, мати Яковова, і інші з ними, — і вони розповіли апо́столам це. Та слова́ їхні здалися їм вигадкою, — і не повірено їм. Петро ж устав та до гро́бу побіг, і, нахилившися, бачить — лежать самі тільки покривала. І вернувсь він до себе, і дивувався, що́ сталось. І ото, двоє з них того ж дня йшли в село, на ім'я́ Еммау́с, що від Єрусалиму лежало на стадій[37] із шістдеся́т. І розмовляли вони між собою про все те, що́ сталося."},"wrongAnswers":["Саломія","Марта","Клеопа"],"gameTopic":"gospels","ladderStep":10},{"question":"Як звали першого сина народженого на землі?","answer":"Каїн","categories":["new_testament","gospels","miracles"],"reference":"Luke 24:10","reference_uk":"Вiд Луки 24:10","ogienko":{"loc":"Вiд Луки 24:10","text":"То були́: Марія Магдали́на, і Іванна, і Марія, мати Яковова, і інші з ними, — і вони розповіли апо́столам це. Та слова́ їхні здалися їм вигадкою, — і не повірено їм. Петро ж устав та до гро́бу побіг, і, нахилившися, бачить — лежать самі тільки покривала. І вернувсь він до себе, і дивувався, що́ сталось. І ото, двоє з них того ж дня йшли в село, на ім'я́ Еммау́с, що від Єрусалиму лежало на стадій[37] із шістдеся́т. І розмовляли вони між собою про все те, що́ сталося."},"wrongAnswers":["Сиф","Авель","Адам"],"gameTopic":"gospels","ladderStep":1},{"question":"Три названі жінки знайшли гріб Ісуса відчиненим і порожнім: Марія Магдалина, Іванна, і хто ще?","answer":"Марія","categories":["new_testament","gospels","miracles"],"reference":"Luke 24:10 (the mother of James)","reference_uk":"Вiд Луки 24:10","ogienko":{"loc":"Вiд Луки 24:10","text":"То були́: Марія Магдали́на, і Іванна, і Марія, мати Яковова, і інші з ними, — і вони розповіли апо́столам це. Та слова́ їхні здалися їм вигадкою, — і не повірено їм. Петро ж устав та до гро́бу побіг, і, нахилившися, бачить — лежать самі тільки покривала. І вернувсь він до себе, і дивувався, що́ сталось. І ото, двоє з них того ж дня йшли в село, на ім'я́ Еммау́с, що від Єрусалиму лежало на стадій[37] із шістдеся́т. І розмовляли вони між собою про все те, що́ сталося."},"wrongAnswers":["Саломія","Марта","Саломея"],"gameTopic":"gospels","ladderStep":9},{"question":"До якого коліна Ізраїля належав Мойсей?","answer":"Левій","categories":["old_testament","exodus","prophets"],"reference":"Exodus 2:1","reference_uk":"Вихід 2:1","ogienko":{"loc":"Вихід 2:1","text":"І пішов один муж з дому Левія, і взяв собі за жінку дочку Левієву. І завагітніла та жінка, та й сина вродила. І побачила його, що він гарний, та й ховала його три місяці. Та не могла його більше ховати. І взяла йому папірусову скриньку, і виасфальтувала її асфальтом та смолою, і положила до неї дитину, та й поклала в очереті на бе́резі Річки.[2] А сестра його стояла здалека, щоб довідатися, що йому станеться. І зійшла фараонова дочка купатися на Річку, а служниці її ходили понад Річкою. І побачила вона ту скриньку серед очерету, — і послала невільницю свою, щоб узяла її."},"wrongAnswers":["Веніямин","Юда","Єфрем"],"gameTopic":"manna_desert","ladderStep":7},{"question":"У яку землю втік Мойсей після вбивства єгиптянина?","answer":"Мідіян","categories":["old_testament","prophets","exodus"],"reference":"Exodus 2:15","reference_uk":"Вихід 2:15","ogienko":{"loc":"Вихід 2:15","text":"І почув фараон про цю справу, та й шукав, щоб убити Мойсея. І втік Мойсей від фараонового лиця, й оселився в країні Мідіян. А в мідіянського жерця було сім дочок. І прийшли вони, і витягали воду, і напо́внили корита, щоб напоїти ота́ру свого батька. І прийшли пастухи й відігнали їх. І встав Мойсей, та й оборонив їх, і напоїв їхню отару. І прибули́ вони до Реуїла,[4] свого батька, а той поспитав: „Чого ви сьогодні так скоро прийшли?“ А ті відказали: „Якийсь єгиптянин оборонив нас від руки пастухів, а також навіть натягав нам води й напоїв отару“."},"wrongAnswers":["Ханаан","Єдом","Єгипет"],"gameTopic":"manna_desert","ladderStep":9},{"question":"Перше чудо Христа — перетворення води на вино. Де це сталося?","answer":"Кана Галілейська","categories":["new_testament","gospels","miracles"],"reference":"John 2:6-9, 11","reference_uk":"Вiд Івана 2:6","ogienko":{"loc":"Вiд Івана 2:6","text":"Було тут шість камінних посу́дин на воду, що стояли для очи́щення юдейського, що відер по дві чи по три вміщали. Ісус каже до слуг: „Напо́вніть водою посу́дини“. І їх поналива́ли вще́рть. І Він каже до них: „Тепер зачерпні́ть, і занесіть до весільного ста́рости“. І занесли. Як весільний же ста́роста скуштува́в воду, що сталась вином, а він не знав, звідки воно, — знали ж слу́ги, що води наливали, — то староста кличе тоді молодо́го та й каже йому: „Кожна люди́на подає перше добре вино, а як понапива́ються, тоді гірше; а ти добре вино аж на досі зберіг“."},"wrongAnswers":["Назарет","Єрусалим","Капернаум"],"gameTopic":"gospels","ladderStep":2},{"question":"Сара була першою дружиною Авраама. Хто була другою?","answer":"Кетура","categories":["old_testament"],"reference":"Genesis 25:1","reference_uk":"Буття 25:1","ogienko":{"loc":"Буття 25:1","text":"А Авраам іще взяв жінку, а ймення їй Кетура́. А вона породила йому Зімрана, і Йокшана, і Мадана, і Мідіяна, і Їшбака, і Шуаха. А Йокшан породив був Шеву та Дедана. А сини Деданові були: ашшури, і летуші, і леуми. А сини Мідіянові: Ефа, і Ефер, і Ханох, і Авіда, і Елдаа, — усі вони сини Кетури. І віддав Авраам усе, що мав, Ісакові."},"wrongAnswers":["Агар","Сара","Ревека"],"gameTopic":"ot_general","ladderStep":7},{"question":"Що виніс Мойсей з Єгипту під час виходу?","answer":"Кості Йосипа","categories":["old_testament","prophets","exodus"],"reference":"Exodus 13:19","reference_uk":"Вихід 13:19","ogienko":{"loc":"Вихід 13:19","text":"А Мойсей забрав із собою кості Йо́сипа, бо присягою той закляв був Ізраїлевих синів, кажучи: „Напевно згадає Бог вас, і ви винесете з собою кості мої звідси“. І вони ру́шили з Суккоту, і розта́борилися в Етам, на границі пустині. А Господь ішов перед ними вдень у стовпі хмари, щоб провадити їх дорогою, а вночі́ в стовпі огню́, щоб світити їм, щоб ішли вдень та вночі. Не відступав удень стовп хмари тієї, а вночі стовп огню з-перед обличчя народу!"},"wrongAnswers":["Скриню завіту","Скрижалі Закону","Золото з Єгипту"],"gameTopic":"manna_desert","ladderStep":7},{"question":"Скільки років було Авраамові, коли його обрізали?","answer":99,"categories":["old_testament"],"reference":"Genesis 17","reference_uk":"Буття 17:1","ogienko":{"loc":"Буття 17:1","text":"І був Аврам віку дев'ятидесяти літ і дев'яти літ, коли явився Господь Аврамові та й промовив до нього: „Я Бог Всемогутній! Ходи перед лицем Моїм, і будь непорочний! І дам Я Свого заповіта поміж Мною та поміж тобою, і дуже-дуже розмножу тебе“. І впав Аврам на обличчя своє, а Бог до нього промовляв, говорячи: „Я, — ось Мій заповіт із тобою, і станеш ти батьком багатьох наро́дів. І не буде вже кли́катись ім'я твоє: Аврам, але буде ім'я твоє: Авраа́м,[51] бо вчинив Я тебе батьком багатьох народів."},"wrongAnswers":["100","90","85"],"gameTopic":"ot_general","ladderStep":10},{"question":"Після тріумфального в’їзду в Єрусалим і відвідин храму де провів ніч Ісус?","answer":"Віфа́нія","categories":["new_testament","gospels"],"reference":"Mark 11:11","reference_uk":"Вiд Марка 11:11","ogienko":{"loc":"Вiд Марка 11:11","text":"Потому ввійшов Він до Єрусалиму, і в храм. А оглянувши все, як година вже пізня була, Він пішов у Віфа́нію з Дванадцятьма́. А назавтра, коли вони вийшли з Віфа́нії, Він зголодні́в. І, побачивши зда́лека фіґове дерево, вкрите листями, Він підійшов, чи не зна́йде на ньому чого́. І, прийшовши до нього, не знайшов нічого, крім листя само́го, — не пора бо на фіґи була́. І озвався Ісус і промовив до нього: „Щоб більше ніхто твого пло́ду не з'їв аж повіки!“ А учні Його все те чули. І прийшли вони в Єрусалим. А як Він у храм увійшов, то став виганяти продавців і покупців у храмі, і попереверта́в столи грошомі́нам та осло́ни — продавцям голубів."},"wrongAnswers":["Єрусалим","Галілейське село","Гефсиманія"],"gameTopic":"gospels","ladderStep":10},{"question":"Перші двоє учнів, яких покликав Ісус, були братами. Назвіть їх за абеткою (____ та ____).","answer":"Андрій і Симон","categories":["new_testament","gospels"],"reference":"Mark 1:16","reference_uk":"Вiд Марка 1:16","ogienko":{"loc":"Вiд Марка 1:16","text":"А коли Він проходив біля Галіле́йського моря, то побачив Си́мона та Андрія, брата Си́монового, що не́вода в море закида́ли, — бо риба́лки були́. І сказав їм Ісус: „Ідіть услід за Мною, — і зроблю́, що станете ви ловця́ми людей“. І зараз вони свого не́вода кинули, — та й пішли вслід за Ним. А коли недалеко прийшов, то побачив Він Якова Зеведе́євого та брата його Івана, що й вони в чо́вні не́вода ла́годили. І зараз покликав Він їх. І вони залишили батька свого Зеведе́я в чо́вні з робі́тниками, — і пішли вслід за Ним."},"wrongAnswers":["Яків і Йоан","Андрій і Петро","Філіп і Нафанаїл"],"gameTopic":"gospels","ladderStep":9},{"question":"Яке коліно Ізраїля не мало дістати спадкової землі в Ханаані?","answer":"Левія","categories":["old_testament"],"reference":"Deuteronomy 18:2","reference_uk":"Повторення Закону 18:2","ogienko":{"loc":"Повторення Закону 18:2","text":"А спа́дку не буде йому серед братів його: Господь — Він спа́док його, як Він говорив був йому. А оце буде належати священикам від народу, від тих, хто приносить жертву: коли це віл, коли це одне з дрібної худоби, то даси священикові плече́, і що́ки, і шлу́нок. Початок від збіжжя свого, від виноградного соку свого, і від оливки своєї, і початок стри́ження отари своєї даси ти йому. Бо його вибрав Господь, Бог твій, зо всіх племен твоїх, щоб ставав він служити в Господнє Ім'я́, він та сини його по всі дні. А коли при́йде Левит з одної з брам твоїх з усього Ізраїля, де він мешкає там, і прибуде за всім жада́нням своєї душі до місця, яке вибере Господь,"},"wrongAnswers":["Юда","Симеон","Іссахар"],"gameTopic":"ot_general","ladderStep":6},{"question":"Яке місто називають містом Давида?","answer":"Вифлеєм","categories":["old_testament","new_testament","kings_judges"],"reference":"Luke 2:4","reference_uk":"Вiд Луки 2:4","ogienko":{"loc":"Вiд Луки 2:4","text":"Пішов теж і Йо́сип із Галілеї, із міста Назарету, до Юдеї, до міста Давидового, що зветься Вифлеє́м, бо похо́див із дому та з роду Давидового, щоб йому записатись із Марією, із ним зару́ченою, що була́ вагітна́. І сталось, як були́ вони там, то настав їй день породити. І породила вона свого Пе́рвенця Сина, і Його сповила́, і до я́сел поклала Його́, — бо в за́їзді[8] місця не стало для них. А в тій стороні були́ пастухи, які пильнували на полі, і нічно́ї пори вартували отару свою."},"wrongAnswers":["Єрусалим","Хеврон","Назарет"],"gameTopic":"cities","ladderStep":10},{"question":"Хто їв мед із туші лева?","answer":"Самсон","categories":["old_testament","kings_judges"],"reference":"Judges 14:5-9","reference_uk":"Книга Суддiв 14:5","ogienko":{"loc":"Книга Суддiв 14:5","text":"І зійшов Самсо́н і батько його та мати його до Тімни́, і прийшли аж до тімненських виноградників, — аж ось навпроти нього ричи́ть левчу́к. І зійшов на нього Дух Господній, і він розірвав того левчука, як розривають ягня, а в руці його не було нічого. І він не сказав своєму батькові та своїй матері, що́ зробив. І він зійшов, і говорив до тієї жінки, і вона стала улю́блена в Самсонових оча́х. А по ча́сі він вертався забрати її, і звернув із дороги побачити па́дло лева, — аж ось рій бджіл у тілі того лева та мед. І він ви́шкріб його на свою до́лоню, і пішов, і їв та й їв. І він пішов до батька свого й до матері своєї, та й дав їм, і вони їли. І він не сказав їм, що той мед він зішкрі́б із тіла лева."},"wrongAnswers":["Давид","Саул","Егоуд"],"gameTopic":"judges_kings","ladderStep":4},{"question":"Яким відомим містом правив Навуходоносор?","answer":"Вавилон","categories":["old_testament","prophets","kings_judges"],"reference":"??","reference_uk":null,"ogienko":null,"wrongAnswers":["Ніневія","Ур","Єрихон"],"gameTopic":"cities","ladderStep":6},{"question":"Хто був першим первосвящеником Ізраїля?","answer":"Аарон","categories":["old_testament","prophets","exodus"],"reference":"Exodus 28","reference_uk":"Вихід 28:1","ogienko":{"loc":"Вихід 28:1","text":"А ти візьми до себе брата свого Аарона та синів його з ним, з-поміж Ізраїлевих синів, щоб він був священиком для Мене, Аарона, Надава, і Авігу, Елеазара та Ітамара, синів Ааронових. І зробиш свяще́нні ша́ти для брата свого Аарона на славу й красу́. І ти скажеш усім мудросердим,[50] що Я напо́внив їх духом мудрости, і вони зроблять Ааронові ша́ти для посвя́чення його, щоб був священиком для Мене. А оце ті ша́ти, що вони зроблять: нагру́дник, і ефо́д, і верхню ша́ту, і хіто́н пле́тений, завій[51] і пояс. І зробиш свяще́нні ша́ти для брата свого Аарона та для синів його, щоб він був священиком для Мене. І ві́зьмуть вони золота, і блакиті, і пурпуру, і червені та віссо́ну, —"},"wrongAnswers":["Мойсей","Самуїл","Фінеес"],"gameTopic":"manna_desert","ladderStep":4},{"question":"Хто єдина жінка, про вік якої прямо сказано в Біблії?","answer":"Сара","categories":["old_testament"],"reference":"Genesis 23:1","reference_uk":"Буття 23:1","ogienko":{"loc":"Буття 23:1","text":"І було життя Сарриного сто літ і двадцять літ і сім літ, — літа життя Сарриного. І вмерла Сарра в Кіріят-Арбі, — це Хеврон у кра́ї ханаанському. І прибув Авраам голосити над Саррою та плакати за нею. І встав Авраам від обличчя небіжки своєї, та й сказав синам Хетовим, говорячи: „Я прихо́дько й захо́жий між вами. Дайте в себе мені власність для гробу, і нехай я поховаю свою небіжку з-перед обличчя свого“. І відповіли́ сини Хетові Авраамові, та й сказали йому:"},"wrongAnswers":["Ревека","Рахіль","Лія"],"gameTopic":"ot_general","ladderStep":9},{"question":"Які дві книги Біблії названі на честь жінок? (____ та ____, у порядку появи в Писанні)","answer":"Рут і Естер","categories":["old_testament"],"reference":"Ruth and Esther","reference_uk":null,"ogienko":{"loc":"Рут 1:1-5","text":"І сталось за ча́су, коли судді судили, то був голод у Краю́. І пішов був чоловік з Юдиного Віфлеєму мешкати в моавських поля́х, він і жінка та двоє синів його. А ім'я́ тому чоловікові Елімеле́х, а ім'я́ жінці його Ноомі́; і ім'я́ двох синів його — Махлон і Кілйон, ефратяни з Віфлеєму Юдиного. І прийшли вони на моавські поля́, та й залишилися. І помер Елімелех, муж Ноомі́, і зоста́лася вона та два їхні си́ни. І взяли вони собі за жіно́к моаві́тянок, — ім'я́ одній Орпа́, а ім'я другій Рут. І сиділи вони там близько десяти літ. І повмирали й вони обоє, Махлон та Кілйон. І позосталася та жінка по двох ді́тях своїх та по чоловікові своєму."},"wrongAnswers":["Естер і Рут","Юдиф і Рут","Немає таких книг"],"gameTopic":"ot_general","ladderStep":7},{"question":"Скільки юдеїв було вигнано до Вавилону Навуходоносором?","answer":4600,"categories":["old_testament","kings_judges"],"reference":"Jeremiah 52:30","reference_uk":"Єремiя 52:30","ogienko":{"loc":"Єремiя 52:30","text":"У році двадцятому й третьому вигнав Невузар'адан, начальник царсько́ї сторожі, сім сотень сорок і п'ять душ юдеїв. Усіх душ — чотири тисячі й шість сотень. І сталося за тридцятого й сьомого року вигна́ння Єгояки́ма, Юдиного царя, дванадцятого місяця, двадцятого й п'ятого дня місяця, Евіл-Меродах, цар вавилонський, у році свого зацарюва́ння, зми́лувався[63] над Єгояки́мом, Юдиним царем, і вивів його з дому ув'я́знення. І він говорив з ним добре, і поставив трона його понад трона царів, що були з ним у Вавилоні. І змінив в'язни́чну одежу його, і він за́вжди їв хліб перед ним по всі дні свого життя. А їжа його, їжа стала, видавалася йому від вавилонського царя, щоденне кожного дня, аж до дня його смерти, по всі дні його життя."},"wrongAnswers":["4200","5000","3800"],"gameTopic":"judges_kings","ladderStep":10},{"question":"Готуючи Ізраїля до завоювання семи народів Ханаану, скільки воїнів нарахував Мойсей?","answer":603550,"categories":["old_testament","kings_judges"],"reference":"Numbers 1:46","reference_uk":"Числа 1:46","ogienko":{"loc":"Числа 1:46","text":"і були всі перелічені — шістсо́т тисяч і три тисячі й п'ятсот і п'ятдеся́т. А Левити не були перелічені серед них за племенем батьків своїх. І Господь промовляв до Мойсея, говорячи: „Тільки Леві́євого племени не переглянеш і не перелічиш їх серед Ізраїлевих синів. А ти постав Леви́тів нагля́дачами над скинією свідоцтва,[1] і над усіма речами її та над усім, що її. Вони будуть носити скинію та всі її речі, і вони будуть обслуго́вувати її, і ота́боряться навко́ло скинії."},"wrongAnswers":["600000","550000","625000"],"gameTopic":"judges_kings","ladderStep":10},{"question":"Скільки народів мали знищити ізраїльтяни, входячи в Ханаан?","answer":7,"categories":["old_testament","exodus"],"reference":"Acts 13:19","reference_uk":"Дiї 13:19","ogienko":{"loc":"Дiї 13:19","text":"а вигубивши сім наро́дів в землі ханаа́нській, поділив жеребко́м їхню землю між ними, ма́йже що по чотириста й п'ятидесяти ро́ках. Після того аж до Самуїла пророка Він їм суддів дава́в. А потім забажали царя, і Бог дав їм Сау́ла, сина Кі́сового, мужа з Веніями́нового племени, на чотири десятки років. А його віддаливши, поставив царем їм Дави́да, про якого й сказав, засвідчуючи: „Знайшов Я Давида, сина Єссе́євого, чоловіка за серцем Свої́м, що всю волю Мою він виконувати бу́де“. За обітницею, із його насіння підняв Бог Ісуса, як спасі́ння Ізраїлеві,"},"wrongAnswers":["5","6","10"],"gameTopic":"manna_desert","ladderStep":10},{"question":"Хто «стрибав утробі», коли Марія прийшла до Єлисавети?","answer":"Іван Хреститель","categories":["new_testament","gospels"],"reference":"Luke 1:41","reference_uk":"Вiд Луки 1:41","ogienko":{"loc":"Вiд Луки 1:41","text":"Коли ж Єлисавета зачула Маріїн привіт,[5] затріпота́ла дитина в утро́бі її. І Єлисавета напо́внилась Духом Святим, і скрикнула голосом гучним, та й прорекла́: „Благослове́нна Ти між жо́нами, і благослове́нний Плід утро́би твоєї! І звідкіля́ мені це, що до мене прийшла мати мого Господа? Бо як тільки в ву́хах моїх голос привіту твого забрині́в, — від ра́дощів затріпота́ла дитина в утробі моїй! Блаженна ж та, що повірила, бо спо́вниться проре́чене їй від Господа!“"},"wrongAnswers":["Йосип","Юда","Микола"],"gameTopic":"gospels","ladderStep":5},{"question":"Після годування п’ятьма хлібами й двома рибами скільки повних кошів зосталося?","answer":"Дванадцять кошів","categories":["new_testament","gospels","miracles"],"reference":"Matthew 14:20","reference_uk":"Вiд Матвiя 14:20","ogienko":{"loc":"Вiд Матвiя 14:20","text":"І всі їли й наси́тились, а з кусків позосталих назбирали двана́дцятеро повних кошів. Їдців же було мужа тисяч із п'ять, крім жіно́к і дітей. І зараз звелів Ісус учням до чо́вна сідати, і перепли́сти на той бік раніше Його, аж поки наро́д Він відпу́стить. Відпусти́вши ж народ, Він на го́ру пішов помолитися насамоті́; і як вечір настав, був там Сам. А чо́вен вже був на сере́дині моря, і кидали хвилі його, бо вітер зірвавсь супроти́вний."},"wrongAnswers":["Сім кошів","Дев’ять кошів","П’ять кошів"],"gameTopic":"gospels","ladderStep":8},{"question":"У сьомий день скільки разів військо Ісуса Навина обійшло Єрихон перед падінням мурів?","answer":7,"categories":["old_testament","exodus","miracles"],"reference":"Joshua 6:5","reference_uk":"Ісус Навин 6:5","ogienko":{"loc":"Ісус Навин 6:5","text":"І станеться, коли засурми́ть бара́нячий ріг, коли ви почуєте голос тієї сурми́, а ввесь народ крикне гучни́м криком, то мур цього міста впаде́ на своєму місці, а народ уві́йде кожен перед себе“. І покликав Ісус, син Навинів, священиків, та й сказав до них: „Несіть ковчега заповіту, а сім священиків будуть нести сім су́рем із баранячих ро́гів перед Господнім ковчегом“. А до народу сказав: „Підіть, обійдіть навколо це місто, а озбро́єний пі́де перед Господнім ковчегом“. І сталося, як Ісус сказав це наро́дові, то сім священиків, що не́сли сім су́рем із баранячих рогів, ішли та сурми́ли в ці су́рми, а ковчег Господнього заповіту йшов за ними. А озбро́єні йшли перед священиками, що сурми́ли в роги, а ві́йсько заднє йшло за ковчегом. І все сурми́ли в су́рми."},"wrongAnswers":["1","12","3"],"gameTopic":"manna_desert","ladderStep":7},{"question":"Кого Бог назвав «досконалим і праведним» чоловіком?","answer":"Йов","categories":["old_testament"],"reference":"Job 1:8","reference_uk":"Йов 1:8","ogienko":{"loc":"Йов 1:8","text":"І сказав Господь до сатани: „Чи звернув ти увагу на раба Мого́ Йова? Бо немає такого, як він, на землі: муж він невинний та праведний, що Бога боїться, а від злого втікає“. І відповів сатана́ Господе́ві й сказав: „Чи ж Йов да́рмо боїться Бога? Чи ж Ти не забезпе́чив його, і дім його, і все, що його? Чин його рук Ти поблагослови́в, а маєток його поши́рився по кра́ю. Але простягни тільки руку Свою, і доторкни́ся до всього, що його, — чи він не знева́жить Тебе перед лицем Твоїм?“ І сказав Господь до сатани́: „Ось усе, що його́, — у твоїй руці, тільки на нього само́го не простягай своєї руки!“ І пішов сатана́ від лиця Господнього."},"wrongAnswers":["Ной","Даниїл","Авраам"],"gameTopic":"ot_general","ladderStep":7},{"question":"Окрім Змія, яка тварина в Старому Завіті говорила до людини?","answer":"Осел","categories":["old_testament","miracles"],"reference":"Numbers 22:28-30","reference_uk":"Числа 22:28","ogienko":{"loc":"Числа 22:28","text":"І відкрив Господь уста ослиці, і сказала вона до Валаама: „Що́ я зробила тобі, то ти оце тричі вдарив мене?“ І сказав Валаам до ослиці: „Бо ти виставила мене на сміх. Коли б меч був у руці моїй, то тепер я забив би тебе!“ І сказала осли́ця до Валаама: „Чи ж я не ослиця твоя, що ти їздив на мені, скільки живеш, аж до цього дня? Чи ж справді звикла я робити тобі так?“ І він відказав: „Ні!“ І відкрив Господь очі Валаамові, і побачив він Господнього Ангола, що стоїть на дорозі, а його ви́тягнений меч у руці його. І схилився він, і впав на обличчя своє. І сказав до нього Ангол Господній: „На́що ти вдарив ослицю свою оце тричі? Ось я вийшов за перешкоду, бо ця дорога погибельна передо мною."},"wrongAnswers":["Віл","Голуб","Верблюд"],"gameTopic":"miracles","ladderStep":6},{"question":"Чиє стадо пас Мойсей, коли побачив кущ, що горів?","answer":"Їтра","categories":["old_testament","exodus","miracles"],"reference":"Exodus 3:1","reference_uk":"Вихід 3:1","ogienko":{"loc":"Вихід 3:1","text":"А Мойсей пас отару тестя свого Їтра́, жерця Мідіянського. І провадив він цю отару за пустиню, і прийшов був до Божої гори, до Хори́ву. І явився йому Ангол Господній у по́лум'ї огняному з-посеред терно́вого куща. І побачив він, що та терни́на горить огнем, але не згоря́є кущ. І сказав Мойсей: „Зійду но, і побачу це велике видіння, — чому не згоряє та терни́на?“ І побачив Господь, що він зійшов подивитися. І кликнув до нього Бог з-посеред тієї терни́ни і сказав: „Мойсею, Мойсею!“ А той відказав: „Ось я!“ І сказав Він: „Не зближайся сюди! Здійми взуття́ своє з ніг своїх, бо те місце, на якому стоїш ти, — земля це свята!“"},"wrongAnswers":["Лавана","Навала","Авімелеха"],"gameTopic":"manna_desert","ladderStep":5},{"question":"Хто сказав: «Срібла й золота немає в мене, а що маю, те даю тобі»?","answer":"Петро","categories":["new_testament","miracles"],"reference":"Acts 3:6","reference_uk":"Дiї 3:6","ogienko":{"loc":"Дiї 3:6","text":"Та промовив Петро: „Срібла й золота в мене нема, але що я маю, даю тобі: У Ім'я́ Ісуса Христа Назаряни́на — устань та й ходи!“ І, узявши його за прави́цю, він підвів його. І хвилі тієї зміцни́лися но́ги й сугло́бці його! І, зірвавшись, він устав та й ходив, і з ними у храм увійшов, ходячи та підскакуючи, і хвалячи Бога! Наро́д же ввесь бачив, як ходив він та Бога хвалив. І пізнали його, що це той, що при Красних воро́тях храму сидів ради милостині. І вони перепо́внились жа́хом та по́дивом із того, що́ сталось йому!"},"wrongAnswers":["Павло","Іван","Яків"],"gameTopic":"miracles","ladderStep":6},{"question":"Скільки Йона перебував у череві великої риби?","answer":"Три дні й три ночі","categories":["old_testament","prophets"],"reference":"Jonah 1:17","reference_uk":"Йона 2:1","ogienko":{"loc":"Йона 2:1","text":"І призна́чив Госпо́дь велику рибу, щоб вона проковтну́ла Йону. І був Йона в сере́дині цієї риби три дні та три ночі."},"wrongAnswers":["Сім днів","Одну добу","Сорок днів"],"gameTopic":"prophets","ladderStep":6},{"question":"Скільки днів військо Ісуса Навина ходило довкола Єрихону перед падінням мурів?","answer":7,"categories":["old_testament","miracles","exodus"],"reference":"Joshua 6:3-5: Hebrews 11:3","reference_uk":"Ісус Навин 6:3","ogienko":{"loc":"Ісус Навин 6:3","text":"І обі́йдете навколо це місто, всі вояки́, — о́бхід навко́ло міста один раз. Так зробиш шість день. А сім священиків будуть нести сім сурем із баранячих ро́гів перед ковчегом. А сьомого дня обі́йдете навколо те місто сім раз, а священики засурмлять у ро́ги. І станеться, коли засурми́ть бара́нячий ріг, коли ви почуєте голос тієї сурми́, а ввесь народ крикне гучни́м криком, то мур цього міста впаде́ на своєму місці, а народ уві́йде кожен перед себе“. І покликав Ісус, син Навинів, священиків, та й сказав до них: „Несіть ковчега заповіту, а сім священиків будуть нести сім су́рем із баранячих ро́гів перед Господнім ковчегом“. А до народу сказав: „Підіть, обійдіть навколо це місто, а озбро́єний пі́де перед Господнім ковчегом“."},"wrongAnswers":["6","3","12"],"gameTopic":"manna_desert","ladderStep":4},{"question":"Де поховано царя Давида?","answer":"Місто Давидове","categories":["old_testament","kings_judges"],"reference":"1 Kings 2:10 (aka Old Jerusalem)","reference_uk":"1-а царiв 2:10","ogienko":{"loc":"1-а царiв 2:10","text":"І спочив Давид з батьками своїми, і був похо́ваний у Давидовім Місті. А дні, що Давид царював над Ізраїлем, сорок літ: у Хевроні царював він сім літ, а в Єрусалимі царював тридцять і три роки. І сів Соломон на троні Давида, батька свого, і його царюва́ння було дуже міцне́. І прийшов Адо́нія, син Гаґґітин, до Вірсавії, Соломонової матері, а вона сказала: „Чи при́хід твій — з миром?“ І він відказав: „З миром“. І сказав: „Справа в мене до те́бе“. А вона відказала: „Говори!“"},"wrongAnswers":["Вифлеєм","Хеврон","Єрусалим новий"],"gameTopic":"judges_kings","ladderStep":8},{"question":"При Преображенні хто з’явився й розмовляв з Христом? (____ та ____, у порядку книг Біблії)","answer":"Мойсей та Ілля","categories":["new_testament","gospels","prophets"],"reference":"Matthew 17:3; Mark 9:4; Luke 9:30","reference_uk":"Вiд Матвiя 17:3","ogienko":{"loc":"Вiд Матвiя 17:3","text":"І ось з'явились до них Мойсей та Ілля́, і розмовляли із Ним. І озвався Петро та й сказав до Ісуса: „Господи, до́бре бути нам тут! Коли хочеш, поста́влю оту́т три шатра: для Тебе одне, і одне для Мойсея, і одне для Іллі“. Як він ще говорив, ось хмара ясна заслони́ла їх, і ось голос із хмари почувсь, що казав: „Це Син Мій Улю́блений, що Його Я вподо́бав. Його слухайтеся!“ А почувши, попа́дали учні долі́лиць, і полякалися сильно. А Ісус підійшов, доторкнувся до них і промовив: „Уставайте й не бійтесь!“"},"wrongAnswers":["Ілля та Мойсей","Авраам та Ісак","Мойсей та Аарон"],"gameTopic":"gospels","ladderStep":10},{"question":"Скільки блаженств у нагірній проповіді?","answer":8,"categories":["new_testament","gospels"],"reference":"Matthew 5:3-10","reference_uk":"Вiд Матвiя 5:3","ogienko":{"loc":"Вiд Матвiя 5:3","text":"„Блаже́нні[12] вбогі духом, бо їхнє Царство Небесне. Блаженні засму́чені, бо вони будуть утішені. Блаженні ла́гідні, бо землю вспадку́ють вони. Блаженні голодні та спра́гнені праведности, бо вони нагодо́вані будуть. Блаженні милости́ві, бо помилувані вони будуть."},"wrongAnswers":["7","9","10"],"gameTopic":"gospels","ladderStep":10},{"question":"Скільки років було Ноєві, коли на землю прийшов потоп?","answer":600,"categories":["old_testament"],"reference":"Genesis 4:6","reference_uk":"Буття 4:6","ogienko":{"loc":"Буття 4:6","text":"І сказав Господь Каїнові: „Чого ти розгнівався, і чого похилилось[25] обличчя твоє? Отож, коли ти добре робитимеш, то підіймеш обличчя своє,[25] а коли недобре, то в дверях гріх підстерігає. І до тебе його пожада́ння, а ти мусиш над ним панувати“. І говорив Каїн до Авеля, брата свого. І сталось, як були вони в полі, повстав Каїн на Авеля, брата свого, — і вбив його. І сказав Господь Каїнові: „Де Авель, твій брат?“ А той відказав: „Не знаю. Чи я сторож брата свого́?“ І сказав Господь: „Що́ ти зробив? Голос крови брата твого взиває до Мене з землі."},"wrongAnswers":["500","650","480"],"gameTopic":"ot_general","ladderStep":7},{"question":"Який із одинадцяти братів Йосипа (у пестрявому плащі) сказав не вбивати Йосипа, а кинути його в яму?","answer":"Рувим","categories":["old_testament"],"reference":"Genesis 37:21-22","reference_uk":"Буття 37:21","ogienko":{"loc":"Буття 37:21","text":"І почув це Руви́м, і визволив його з руки їхньої, і сказав: „Не губімо душі його!“ І сказав до них Рувим: „Не проливайте крови, — киньте його до ями тієї, що в пустині, а руки́ не кладіть на нього\\", щоб визволити його з їхньої руки, щоб вернути його до батька його. І сталося, коли прийшов Йо́сип до братів своїх, то вони стягнули з Йосипа вбрання його, вбрання квітчасте, що на ньому було. І взяли його, та й кинули його до ями, а яма та порожня була, — не було в ній води. І сіли вони попоїсти хліба. І звели вони очі свої та й побачили, — ось караван ізмаїлітів іде з Ґілеаду, а верблюди їхні несуть пахощі, і бальзам, і ладан, — іде він спровадити це до Єгипту."},"wrongAnswers":["Юда","Симеон","Левій"],"gameTopic":"ot_general","ladderStep":9},{"question":"У яку країну Павло сказав, що збирається відвідати римлян?","answer":"Іспанія","categories":["new_testament"],"reference":"Romans 15:24","reference_uk":"До римлян 15:24","ogienko":{"loc":"До римлян 15:24","text":"коли тільки піду́ до Еспа́нії, прибу́ду до вас. Бо маю надію, як бу́ду прохо́дити, побачити вас, і що ви проведе́те мене туди, коли перше почасти матиму я задово́лення з вами побути. А тепер я йду до Єрусалиму послужити святим, бо Македо́нія й Аха́я ви́знали за добре подати деяку поміч незаможним святим, що в Єрусалимі живуть. Бо ви́знали за добре, та й боржники́ вони їхні. Бо коли погани стали спільника́ми в їх духовнім, то повинні й у тілеснім послужити їм. Як це докінчу́ та достачу їм плід цей, тоді через ваше місто я піду́ до Еспа́нії."},"wrongAnswers":["Греція","Македонія","Галатія"],"gameTopic":"nt_general","ladderStep":10},{"question":"Скільки років було Адамові, коли він помер?","answer":"930","categories":["old_testament"],"reference":"Genesis 5:3","reference_uk":"Буття 5:3","ogienko":{"loc":"Буття 5:3","text":"І жив Адам сто літ і тридцять, та й сина породив за подобою своєю та за образом своїм, і назвав ім'я йому: Сиф.[28] І було́ Адамових днів по тому, як він Сифа породив, вісім сотень літ. І породив він синів і дочок. А всіх Адамових днів було́, які жив, дев'ять сотень літ і тридцять літ. Та й помер він. І жив Сиф сто літ і п'ять літ, та й породив він Еноша. І жив Сиф по тому, як Еноша породив, вісім сотень літ і сім літ. І породив він синів і дочок."},"wrongAnswers":["900","800","960"],"gameTopic":"ot_general","ladderStep":4},{"question":"Скільки разів Петрові сказали прощати брата, що згрішив проти нього?","answer":"Сімдесят разів по сім","categories":["new_testament","gospels"],"reference":"Matthew 18:22","reference_uk":"Вiд Матвiя 18:22","ogienko":{"loc":"Вiд Матвiя 18:22","text":"Ісус промовляє до нього: „Не кажу тобі — до семи раз, але аж до семидесяти раз по семи! Тим то Царство Небесне подібне одно́му царе́ві, що захотів обраху́нок зробити з своїми рабами. Коли ж він почав обрахо́вувати, то йому привели́ одно́го, що винен був десять тисяч тала́нтів.[73] А що він не мав із чо́го віддати, наказав пан продати його, і його дружи́ну та діти, і все, що́ він мав, — і заплатити. Тоді раб той упав до ніг, і вклонявся йому та благав: „Потерпи мені, — я віддам тобі все!“"},"wrongAnswers":["Сім разів","Двадцять разів","Сто разів"],"gameTopic":"gospels","ladderStep":7},{"question":"Скільки днів Савл був без зору після навернення на дорозі в Дамаск?","answer":3,"categories":["new_testament"],"reference":"Acts 9:9","reference_uk":"Дiї 9:9","ogienko":{"loc":"Дiї 9:9","text":"І три дні невидю́щий він був, і не їв, і не пив. А в Дама́ску був учень один, на йме́ння Ана́ній. І Господь у видінні промовив до нього: „Ана́нію!“ А він відказав: „Ось я, Господи!“ Господь же до нього: „Устань, і піди на вулицю, що Про́стою зветься, і пошукай в домі Юдовім Са́вла на йме́ння, тарся́нина, ось бо він мо́литься, і мужа в видінні він бачив, на йме́ння Ананія, що до нього прийшов і руку на нього поклав, щоб став він видю́щий“. Відповів же Ана́ній: „Чув я, Господи, від багатьох про цього́ чоловіка, скільки зла він учинив в Єрусалимі святим Твоїм!"},"wrongAnswers":["7","1","14"],"gameTopic":"nt_general","ladderStep":6},{"question":"Де поховано Мойсея?","answer":"Долина Моава","categories":["old_testament","exodus"],"reference":"Deuteronomy 34:6 (in the valley)","reference_uk":"Повторення Закону 34:6","ogienko":{"loc":"Повторення Закону 34:6","text":"І похова́ний він у долині в моавському кра́ї навпроти Бет-Пеору, і ніхто не знає гро́бу його аж до цього дня. А Мойсей був віку ста й двадцяти́ літ, коли він помер, та не зате́мнилось око його, і воло́гість[24] його не зменшилась. І оплакували Мойсея Ізраїлеві сини в моавських степа́х тридцять день, та й покінчи́лися дні опла́кування жало́би за Мойсеєм. А Ісус, син Нави́нів, був повний духа мудрости, бо Мойсей поклав свої руки на нього. І слухали його Ізраїлеві сини, і робили, як Господь наказав був Мойсеєві. І не появився вже в Ізраїлі пророк, як Мойсей, що знав його Господь обличчя-в-обличчя,"},"wrongAnswers":["Гора Нево","Гора Синай","Пустеля Паран"],"gameTopic":"manna_desert","ladderStep":9},{"question":"Приблизно о якій годині Ісус сказав: «Боже Мій, Боже Мій, чому Ти Мене покинув?»","answer":"Дев’ятій годині","categories":["new_testament","gospels"],"reference":"Matthew 27:46","reference_uk":"Вiд Матвiя 27:46","ogienko":{"loc":"Вiд Матвiя 27:46","text":"А коло години дев'ятої скрикнув Ісус гучни́м голосом, кажучи: „Елі́, Елі́, лама́ савахта́ні?“[110] цебто: „Боже Мій, Боже Мій, на́що Мене Ти покинув?“ Дехто ж із тих, що стояли там, це почули й казали, що Він кличе Іллю́. А один із них зараз побіг і взяв гу́бку та, оцтом її напо́внивши, настромив на трости́ну й давав Йому пити.[111] Інші казали: „Чекай но, поба́чмо, — чи при́йде Ілля[112] визволяти Його“. А Ісус знову голосом гучним скрикнув, — і духа віддав."},"wrongAnswers":["Третій годині","Шостій годині","Дванадцятій гдині"],"gameTopic":"gospels","ladderStep":9},{"question":"Скільки років було Мойсеєві, коли він помер?","answer":"120","categories":["old_testament","exodus"],"reference":"Deuteronomy 34:7","reference_uk":"Повторення Закону 34:7","ogienko":{"loc":"Повторення Закону 34:7","text":"А Мойсей був віку ста й двадцяти́ літ, коли він помер, та не зате́мнилось око його, і воло́гість[24] його не зменшилась. І оплакували Мойсея Ізраїлеві сини в моавських степа́х тридцять день, та й покінчи́лися дні опла́кування жало́би за Мойсеєм. А Ісус, син Нави́нів, був повний духа мудрости, бо Мойсей поклав свої руки на нього. І слухали його Ізраїлеві сини, і робили, як Господь наказав був Мойсеєві. І не появився вже в Ізраїлі пророк, як Мойсей, що знав його Господь обличчя-в-обличчя, щодо всіх ознак та чуд, що Господь послав його чинити в єгипетськім кра́ї фараонові й усім рабам його та всьому його краєві,"},"wrongAnswers":["110","100","80"],"gameTopic":"manna_desert","ladderStep":4},{"question":"Згідно з Павлом у Римлян, скільки праведних людей? (число)","answer":0,"categories":["new_testament"],"reference":"Romans 3:10","reference_uk":"До римлян 3:10","ogienko":{"loc":"До римлян 3:10","text":"як написано: „Нема праведного ані о́дного; нема, хто розумів би; немає, хто Бога шукав би, — усі повідступа́ли, ра́зом стали непотрібні, нема доброчинця, нема ні одно́го! Гріб відкритий — їхнє горло, язиком своїм кажуть неправду, отрута зміїна на їхніх губа́х, уста́ їхні повні прокляття й гірко́ти!"},"wrongAnswers":["1","12","3"],"gameTopic":"nt_general","ladderStep":5},{"question":"У Адама й Єви було троє синів: Каїн, Авель і хто третій?","answer":"Сиф","categories":["old_testament"],"reference":"Genesis 4:25","reference_uk":"Буття 4:25","ogienko":{"loc":"Буття 4:25","text":"І пізнав Адам ще свою жінку, — і сина вона породила. І назвала ймення йому: Сиф,[28] бо „Бог дав мені інше насіння за Авеля, що забив його Каїн“. А Сифові теж народився був син, і він назвав імення йому: Енош. Тоді зачали були призивати Ймення Господнє."},"wrongAnswers":["Ной","Енох","Каїн"],"gameTopic":"ot_general","ladderStep":4},{"question":"Кому Ісус сказав: «Не хлібом єдиним житиме людина»?","answer":"Сатана","categories":["new_testament","gospels"],"reference":"Matthew 4:4","reference_uk":"Вiд Матвiя 4:4","ogienko":{"loc":"Вiд Матвiя 4:4","text":"А Він відповів і промовив: „Написано: Не хлібом самим буде жити люди́на, але кожним словом, що походить із уст Божих“. Тоді забирає диявол Його в святе місто, і ставить Його на нарі́жника храму, та й каже Йому: „Коли Ти Син Божий, то кинься додолу, бож написано: „Він накаже про Тебе Своїм Ангола́м, і вони на руках понесу́ть Тебе, щоб об камінь коли не спіткнув Ти Своєї ноги́“. Ісус відказав йому: „Ще написано: Не спокушуй Господа Бога свого!“ Знов диявол бере Його на височе́зную го́ру, і показує Йому всі царства на світі та їхню славу,"},"wrongAnswers":["Петро","Народ у пустелі","Нікодим"],"gameTopic":"gospels","ladderStep":5},{"question":"Скільки хлібів і скільки риб використав Ісус, щоб нагодувати п’ять тисяч?","answer":"П’ять хлібів і дві риби","categories":["new_testament","gospels","miracles"],"reference":"Mark 6:41; Matthew 14:17; John 6:9; Luke 9:13","reference_uk":"Вiд Марка 6:41","ogienko":{"loc":"Вiд Марка 6:41","text":"І Він узяв п'ять хлібів та дві рибі, споглянув на небо, поблагословив, і поламав ті хліби́, і дав учням, щоб клали перед ними, і дві рибі на всіх поділив. І всі їли й наїлися! А з кусків позосталих та з риб назбирали дванадцять повних кошів. А тих, хто хліб споживав, було тисяч із п'ять чоловіка! І зараз звелів Своїм у́чням до чо́вна сідати, і на то́й бік попли́нути до Віфсаїди, раніше Його, поки Сам Він відпустить наро́д."},"wrongAnswers":["Сім хлібів і кілька риб","Три хліби й п’ять риб","Два хліби й сім риб"],"gameTopic":"gospels","ladderStep":8},{"question":"Як називалося місто, яке заснував Каїн?","answer":"Енох","categories":["old_testament"],"reference":"Genesis 4:17","reference_uk":"Буття 4:17","ogienko":{"loc":"Буття 4:17","text":"І Каїн пізнав свою жінку, і стала вона вагітна, і вродила Еноха. І збудував він місто, і назвав ім'я́ тому містові, як ім'я́ свого сина: Енох. І народився в Еноха Ірад, а Ірад породив Мегуяїла, а Мегуяїл породив Метушаїла, а Метушаїл породив Ламеха. І взяв собі Ламех дві жінки, — ім'я одній Ада, а ймення другій Цілла. І породила Ада Явала, — він був батьком тих, що сидять по наметах і мають череду. А ймення брата його Ювал, — він був батьком усім, хто держить у рука́х гусла й сопілку."},"wrongAnswers":["Нод","Вавилон","Ур"],"gameTopic":"cities","ladderStep":6},{"question":"Скільки днів Лазар був у гробі перед воскресінням Ісусом?","answer":4,"categories":["new_testament","gospels","miracles"],"reference":"John 11:39","reference_uk":"Вiд Івана 11:39","ogienko":{"loc":"Вiд Івана 11:39","text":"Промовляє Ісус: „Відваліть цього каменя!“ Сестра вмерлого Марта говорить до Нього: „Уже, Господи, чути, — бо чотири вже дні він у гро́бі“. Ісус каже до неї: „Чи тобі не казав Я, що як бу́деш ти вірувати, — славу Божу побачиш?“ І зняли́ тоді каменя. А Ісус ізвів очі до неба й промовив: „Отче, дяку прино́шу Тобі, що Мене Ти почув. Та Я знаю, що Ти за́вжди почуєш Мене, але ради наро́ду, що довкола стоїть, Я сказав, щоб увірували, що послав Ти Мене“. І, промовивши це, Він скричав гучни́м голосом: „Ла́зарю, — вийди сюди!“"},"wrongAnswers":["3","2","7"],"gameTopic":"gospels","ladderStep":7},{"question":"Скільки бісів вийшло з Марії Магдалини?","answer":"7","categories":["new_testament","gospels","miracles"],"reference":"Luke 8:2","reference_uk":"Вiд Луки 8:2","ogienko":{"loc":"Вiд Луки 8:2","text":"та дехто з жіно́к, що були́ вздоро́влені від злих ду́хів і хвороб: Марія, Магдали́ною[18] звана, що з неї сім де́монів вийшло, і Іва́нна, дружи́на Ху́дзи, урядника Іродового, і Суса́нна, і інших багато, що маєтком своїм їм служили. І, як зібралось багато наро́ду, і з міста до Нього поприхо́дили, то Він промовляти став притчею. „Ось вийшов сіяч, щоб посіяти зе́рно своє. І, як сіяв, упало одне край дороги, — і було повито́птуване, а птахи небесні його повидзьо́бували. Друге ж упало на ґрунт кам'яни́стий, — і, зійшовши, усохло, не мало бо во́гкости."},"wrongAnswers":["6","5","12"],"gameTopic":"gospels","ladderStep":6},{"question":"Чим харчувався Іван Хреститель у юдейській пустелі?","answer":"Сарана й дикий мед","categories":["new_testament","gospels"],"reference":"Matthew 3:4","reference_uk":"Вiд Матвiя 3:4","ogienko":{"loc":"Вiд Матвiя 3:4","text":"Сам же Іван мав одежу собі з верблю́жого во́лосу, і пояс ремінний на сте́гнах своїх; а пожива для нього була́ сарана́ та мед польови́й. Тоді до нього вихо́див Єрусалим, і вся Юдея, і вся йорда́нська око́лиця, і в річці Йорда́ні христились від нього, і визнавали гріхи свої. Як побачив же він багатьох фарисе́їв[8] та саддуке́їв,[8] що приходять на хрищення, то промовив до них: „Роде зміїний, — хто вас надоуми́в утікати від гніву майбутнього? Отож, — учиніть гідний плід покая́ння!"},"wrongAnswers":["Хліб і сіль","Риба й хліб","Молоко й мед"],"gameTopic":"gospels","ladderStep":4},{"question":"Яка гора, з якої Мойсей бачив Ханаан?","answer":"Нево","categories":["old_testament"],"reference":"Deuteronomy 32: 49-50","reference_uk":"Повторення Закону 32:49","ogienko":{"loc":"Повторення Закону 32:49","text":"„Вийди на ту го́ру Аварім, на гору Нево́, що в моавському кра́ї, що навпроти Єрихону, і побач ханаанський край, що Я даю Ізраїлевим синам на володіння. І вмри на горі, куди ти вийдеш, і долучися до своєї рідні, як помер був твій брат Ааро́н на Гор-горі, і долучився до своєї рідні, за те, що ви спроневі́рилися були Мені серед Ізраїлевих синів при воді Меріви в Кадешу на пустині Цін, за те, що ви не освятили Мене серед Ізра́їлевих синів. Бо знавпроти побачиш ти той край, та не вві́йдеш туди, до того кра́ю, що Я даю Ізраїлевим синам“."},"wrongAnswers":["Сінай","Олива","Герізим"],"gameTopic":"ot_general","ladderStep":6},{"question":"Сідраха, Місаха й Авденаго кинули в піч; у скільки разів сильнішим за звичайний наказав цар розжарити вогонь?","answer":7,"categories":["old_testament","prophets","miracles"],"reference":"Daniel 3:19","reference_uk":"Даниїл 3:19","ogienko":{"loc":"Даниїл 3:19","text":"Тоді Навуходоно́сор перепо́внився лю́тістю, і ви́гляд його обличчя змінився проти Шадраха, Мешаха та Авед-Неґо. Він відповів, і наказав напали́ти піч усе́меро понад те, як повинно було́ напали́ти її. І він наказав хоробрим військо́вим му́жам, що були в його ві́йську, зв'язати Шадраха, Мешаха та Авед-Неґо, щоб укинути до палахкотю́чої огне́нної печі. Того ча́су ці мужі були пов'я́зані в своїх плаща́х, у своїх соро́чках і в своїх ша́пках, і в своїх убра́ннях, і були повки́дані до сере́дини палахкотю́чої огне́нної пе́чі. А що слово царя було го́стре, то піч напа́лена була надзвича́йно сильно, так що тих му́жів, що підіймали, щоб укинути Шадраха, Мешаха та Авед-Неґо, забило їх огняне́ по́лум'я. А ці три мужі, Шадрах, Мешах та Авед-Неґо, упали до сере́дини палахкотю́чої огне́нної печі пов'я́зані."},"wrongAnswers":["3","5","10"],"gameTopic":"miracles","ladderStep":8},{"question":"Хто з язичників названий у Біблії помазаником Господнім?","answer":"Кір","categories":["old_testament","kings_judges"],"reference":"Isaiah 45:1 [King of Persia 580 BC – 529 BC]","reference_uk":"Ісая 45:1","ogienko":{"loc":"Ісая 45:1","text":"Так говорить Госпо́дь до Свого пома́занця Кіра: Я мі́цно тримаю тебе за прави́цю, щоб перед обличчям твоїм повали́ти наро́ди, і з сте́гон царів розв'яжу́ пояси́, щоб відчини́ти двері перед тобою, а брами не будуть зами́кані. Я перед тобою піду́ й повирі́внюю ви́сунене, двері мідні злама́ю і порозбива́ю залізні засуви. І дам тобі ска́рби, що в те́мряві, та бага́тства захо́вані, щоб пізнав ти, що Я — то Господь, Який кличе тебе за йме́нням твоїм, Бог Ізраїлів, ради раба Мого Якова й ради вибра́нця Мого Ізраїля, і кличу тебе твоїм іме́нням, тебе називаю, хоч ти не знаєш Мене. Я — Господь, і нема вже ніко́го, нема іншого Бога, крім Ме́не. Я тебе підпері́зую,[57] хоч ти не знаєш Мене,"},"wrongAnswers":["Дарій","Навуходоносор","Артаксеркс"],"gameTopic":"judges_kings","ladderStep":7},{"question":"Який найкоротший вірш у Біблії?","answer":"Ісус плакав","categories":["new_testament","gospels"],"reference":"John 11:35","reference_uk":"Вiд Івана 11:35","ogienko":{"loc":"Вiд Івана 11:35","text":"І заплакав Ісус. А юдеї ка
