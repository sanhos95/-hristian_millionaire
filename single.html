була восьма кара Єгипту?","answer":"Сарана","categories":["old_testament","exodus","miracles"],"reference":"Exodus 10:1-20","reference_uk":"Вихід 10:12","ogienko":{"loc":"Вихід 10:12","text":"І сказав Господь до Мойсея: Простягни свою руку на єгипетський край, і нехай зійде сарана на єгипетський край, і поїсть усяку траву земну, усе, що град позоставив."},"wrongAnswers":["Темрява","Град","Жаби"],"gameTopic":"manna_desert","ladderStep":7},{"question":"Яка була дев’ята кара Єгипту?","answer":"Темрява","categories":["old_testament","exodus","miracles"],"reference":"Exodus 10:21-29","reference_uk":"Вихід 10:21","ogienko":{"loc":"Вихід 10:21","text":"І сказав Господь до Мойсея: Простягни свою руку до неба, і буде темрява над єгипетським краєм, темрява, яку можна відчути."},"wrongAnswers":["Смерть первенців","Сарана","Жаби"],"gameTopic":"manna_desert","ladderStep":7},{"question":"Яка була десята кара Єгипту?","answer":"Смерть первенців","categories":["old_testament","exodus","miracles"],"reference":"Exodus 11-12","reference_uk":"Вихід 12:29","ogienko":{"loc":"Вихід 12:29","text":"І сталося опівночі, і повбивав Господь усе первісткове в єгипетському краї, від первістка фараонового, що сидить на престолі його, аж до первістка в'язня, що в темниці, і все первісткове худоби."},"wrongAnswers":["Кров","Темрява","Град"],"gameTopic":"manna_desert","ladderStep":6},{"question":"Скільки карай наклав Бог на Єгипет?","answer":10,"categories":["old_testament","exodus","miracles"],"reference":"Exodus 7-12","reference_uk":"Вихід 7-12","ogienko":{"loc":"Вихід 7:4","text":"А фараон не послухає вас, і Я покладу Свою руку на Єгипет, і виведу війська Свої, народ Мій, синів Ізраїлевих, з єгипетського краю великими присудами."},"wrongAnswers":["9","7","12"],"gameTopic":"manna_desert","ladderStep":6},{"question":"Скільки книг у Новому Завіті?","answer":27,"categories":["new_testament"],"reference":"-nil-","reference_uk":null,"ogienko":null,"wrongAnswers":["26","28","39"],"gameTopic":"nt_general","ladderStep":4},{"question":"У яке місто входив Ісус, коли Закхей поліз на дерево, щоб Його побачити?","answer":"Єрихон","categories":["new_testament","gospels"],"reference":"Luke 19:1-4","reference_uk":"Вiд Луки 19:1","ogienko":{"loc":"Вiд Луки 19:1","text":"І, ввійшовши Ісус, переходив через Єрихо́н. І ось чоловік, що звався Закхе́й, — він був старши́й над ми́тниками, і був багатий, — бажав ба́чити Ісуса, хто Він, але з-за наро́ду не міг, — бо мали́й був на зріст. І, забігши вперед, він виліз на фіґове дерево, щоб бачити Його, бо Він мав побіч нього прохо́дити. А коли на це місце Ісус підійшов, то поглянув уго́ру до нього й промовив: „Закхе́ю, — зійди за́раз додо́лу, бо сьогодні потрібно Мені бути в домі твоїм!“"},"wrongAnswers":["Єрусалим","Назарет","Вифсаїда"],"gameTopic":"cities","ladderStep":8},{"question":"Яка найдовша глава в Біблії?","answer":"Псалом 119","categories":["old_testament"],"reference":"Psalm 119 (176 verses)","reference_uk":"Псалми 119:1","ogienko":{"loc":"Псалми 119:1","text":"Пісня проча́н. Я кликав до Господа в го́рі своїм, — і Він мене ви́слухав, — Господи, ви́зволь же душу мою від губи́ неправди́вої, від язика́ зрадли́вого! Що́ Тобі дасть, або що́ для Тебе дода́сть лукавий язик? — Заго́стрені стрі́ли поту́жного із ялівце́вим вугі́ллям! Горе мені, що заме́шкую в Ме́шеху, що живу́ із шатра́ми Кеда́ру!"},"wrongAnswers":["Псалом 150","Псалом 1","Єзекіяла 37"],"gameTopic":"ot_general","ladderStep":6},{"question":"Куди пішов Каїн, коли вийшов з Едену?","answer":"Нод","categories":["old_testament"],"reference":"Genesis 4:16","reference_uk":"Буття 4:16","ogienko":{"loc":"Буття 4:16","text":"І вийшов Каїн з-перед лиця Господнього, й осів у країні Нод,[27] на схід від Едену. І Каїн пізнав свою жінку, і стала вона вагітна, і вродила Еноха. І збудував він місто, і назвав ім'я́ тому містові, як ім'я́ свого сина: Енох. І народився в Еноха Ірад, а Ірад породив Мегуяїла, а Мегуяїл породив Метушаїла, а Метушаїл породив Ламеха. І взяв собі Ламех дві жінки, — ім'я одній Ада, а ймення другій Цілла. І породила Ада Явала, — він був батьком тих, що сидять по наметах і мають череду."},"wrongAnswers":["Шинар","Вавилон","Харран"],"gameTopic":"ot_general","ladderStep":8},{"question":"Хто замінив Юду як дванадцятого апостола?","answer":"Маттій","categories":["new_testament"],"reference":"Acts 1:15-26","reference_uk":"Дiї 1:15","ogienko":{"loc":"Дiї 1:15","text":"Тими ж днями Петро став посеред братів — а наро́ду було поіменно до ста двадцяти — та й промовив: „Мужі-браття! Нале́жало збутись Писа́нню тому́, що устами Давидовими Дух Святий був прорік про Юду, який показав дорогу для тих, хто Ісуса схопи́в, бо він був зарахований з нами, і же́реб служі́ння оцього прийняв. І він поле набув за заплату злочи́нства, а впавши сторчма́, він тріснув надво́є, і все нутро́ його вилилось. І стало відо́ме це всім, хто замешкує в Єрусалимі, тому й поле те на́зване їхнього мовою Акелдама́,[1] що є: Поле крови."},"wrongAnswers":["Варнава","Павло","Тимофей"],"gameTopic":"nt_general","ladderStep":9},{"question":"Яке найпоширеніше ім’я в Біблії?","answer":"Захарій","categories":["new_testament","gospels"],"reference":"-nil-","reference_uk":null,"ogienko":null,"wrongAnswers":["Іван","Симон","Йосип"],"gameTopic":"gospels","ladderStep":8},{"question":"З чого зроблені дванадцять брам Нового Єрусалима?","answer":"Перлини","categories":["new_testament"],"reference":"Revelations 21:21","reference_uk":"Об'явлення 21:21","ogienko":{"loc":"Об'явлення 21:21","text":"А дванадцять брам — то дванадцять перли́н, і кожна брама зокре́ма була́ з однієї перли́ни. А вулиці міста — щире золото, прозо́рі, як скло. А храму не бачив я в ньому, бо Госпо́дь, Бог Вседержи́тель — то йому храм і Агнець. І місто не має потреби ні в сонці, ні в місяці, щоб у ньому світили, — слава бо Божа його освітила, а світильник для нього — А́гнець. І наро́ди ходитимуть у світлі його, а зе́мні царі принесу́ть свою славу до нього. А брами його зачиня́тись не бу́дуть удень, бо там но́чі не бу́де."},"wrongAnswers":["Золото","Яспис","Срібло"],"gameTopic":"nt_general","ladderStep":7},{"question":"Як звали чоловіка Ізавелі?","answer":"Ахав","categories":["old_testament","kings_judges"],"reference":"1 Kings 16:31","reference_uk":"1-а царiв 16:31","ogienko":{"loc":"1-а царiв 16:31","text":"І було́ йому мало ходити в гріхах Єровоама, Неватового сина, — і він узяв за жінку Єзаве́ль, дочку́ Етбаала, сидонського царя. І він пішов, і служив Ваа́лові, і вклонявся йому. І він поставив же́ртівника для Ваа́ла в Вааловому домі, якого збудував у Шомероні. І зробив Ахав Астарту. І Ахав далі чинив, щоб гнівити Господа, Бога Ізраїлевого, більше від усіх Ізраїлевих царі́в, що були перед ним. За його днів Хіїл з Бет-Елу відбудува́в Єрихо́на, — на перворіднім своїм Авірамові він заклав його фундаме́нти, а на наймолодшім своїм Сеґівові повставляв брами його, за словом Господа, що говорив через Ісуса, Нави́нового сина."},"wrongAnswers":["Ахазія","Озія","Їорам"],"gameTopic":"judges_kings","ladderStep":5},{"question":"Яке дерево вказано для будови ковчега Ноя?","answer":"Гофер","categories":["old_testament"],"reference":"Genesis 6:14","reference_uk":"Буття 6:14","ogienko":{"loc":"Буття 6:14","text":"Зроби собі ковчега з дерева ґофер. З перегородками зробиш ковчега, і смолою осмолиш його ізсере́дини та ізнадвору. І отак його зробиш: три сотні ліктів довжина ковчега, п'ятдесят ліктів ширина йому, а тридцять ліктів височина йому. Отвір учиниш в ковчезі, і звузиш на лікоть його від гори, а вхід до ковчегу влашту́єш на боці його. Зробиш його на поверхи долішні, другорядні й третьорядні. А Я ось наведу́ пото́п, воду на землю, щоб з-під неба винищити кожне тіло, що в ньому дух життя. Помре все, що на землі! І складу Я заповіта Свойого з тобою, і вві́йдеш до ковчегу ти, і сини твої, і жінка твоя, і жінки́ твоїх синів із тобою."},"wrongAnswers":["Дуб","Кедр","Олива"],"gameTopic":"ot_general","ladderStep":4},{"question":"Як звали брата Мойсея?","answer":"Аарон","categories":["old_testament"],"reference":"Exodus 7:1","reference_uk":"Вихід 7:1","ogienko":{"loc":"Вихід 7:1","text":"І сказав Господь до Мойсея: „Диви́сь, — Я поставив тебе замість Бога для фараона, а твій брат Аарон буде пророк твій. Ти бу́деш говорити все, що Я накажу́ тобі, а брат твій Аарон буде говорити фараонові, — і нехай він відпустить Ізраїлевих синів з свого кра́ю. А Я вчиню́ запеклим фараонове серце, і помно́жу ознаки мої та чуда мої в єгипетськім кра́ї. І не послухає вас фараон, а Я покладу́ Свою руку на Єгипет, і виведу війська Свої,[14] наро́д Мій, синів Ізраїлевих, з єгипетського кра́ю великими при́судами. І пізнають єгиптяни, що Я Госпо́дь, коли простягну Свою ру́ку на Єгипет — і виведу від них Ізраїлевих синів“."},"wrongAnswers":["Марія","Корей","Мойсей"],"gameTopic":"ot_general","ladderStep":2},{"question":"У Біблії сказано, що Бог 4 рази писав власноруч на різних поверхнях. На чому було третє письмо?","answer":"Стіна","categories":["old_testament","miracles","prophets"],"reference":"Dan 5:5-12","reference_uk":"Даниїл 5:5","ogienko":{"loc":"Даниїл 5:5","text":"Аж ось тієї хвилини вийшли пальці людсько́ї руки́, і писали навпро́ти свічника́ на вапні́ стіни царсько́го пала́цу, і цар бачив за́рис руки, що писала. Тоді зміни́лася ясність царя, і думки́ його настра́шили його, ослабі́ли сугло́би кри́жів його, і билися коліна його одне об о́дне. Цар сильно закричав приве́сти заклиначі́в, халде́їв та віщуні́в. Цар заговорив та й сказав вавилонським мудреця́м: „Кожен муж, що прочитає це писа́ння й об'явить мені його ро́зв'язку, той зодя́гне пурпу́ру й золотого ланцюга́ на свою шию, і буде панувати третім у царстві“. Тоді поприхо́дили всі царські́ мудреці́, та не могли прочитати писа́ння й об'явити царе́ві його ро́зв'язку. Тоді цар Валтаса́р сильно перестра́шився, а його ясність зміни́лася на ньому, і його вельмо́жі були безра́дні."},"wrongAnswers":["Камінні скрижалі","Свиток","Пісок"],"gameTopic":"miracles","ladderStep":9},{"question":"З якою твариною розмовляв Валаам?","answer":"Ослиця","categories":["old_testament","miracles"],"reference":"Numbers 22:22-35","reference_uk":"Числа 22:22","ogienko":{"loc":"Числа 22:22","text":"І запалився гнів Божий, що він іде. І став Ангол Господній на дорозі за перешкоду йому, а він їде на своїй ослиці, і двоє слуг його з ним. І побачила та ослиця Господнього Ангола, що стоїть на дорозі, а ви́тягнений меч його в руці його. І збо́чила ослиця з дороги, і пішла полем, а Валаам ударив ослицю, щоб збочила на доро́гу. І став Ангол Господній на стежці виноградників, — стіна з цієї сторони, і стіна з тієї. І побачила та ослиця Господнього Ангола, і прити́снулася до стіни, та й притиснула до стіни Валаамову ногу. І він далі її бив. І Ангол Господній знов перейшов, і став у тісно́му місці, де нема дороги збочити ні право́руч, ні ліво́руч."},"wrongAnswers":["Віл","Кінь","Верблюд"],"gameTopic":"miracles","ladderStep":3},{"question":"Який пророк різко застерігав тих, хто кривдив вдів і сиріт?","answer":"Малахій","categories":["old_testament","prophets"],"reference":"Malachi 3:5","reference_uk":"Малахiї 3:5","ogienko":{"loc":"Малахiї 3:5","text":"І прибу́ду до вас Я на суд, і буду сві́дком швидки́м проти чарівників, і на перелю́бників, і проти тих, хто прися́гу складає на лжу, і проти тих, хто запла́тою на́ймита тисне, вдову́ й сироту́, хто відхилює право чужи́нця, Мене ж не боїться, говорить Госпо́дь Савао́т. Бо Я, Господь, не змі́нююся, тому ви, сини Яковові, не будете зни́щені. Від уста́в Моїх ви відступили́ з днів ваших батькі́в, і їх не стерегли́. Верніться ж до Мене, і верну́сь Я до вас! промовляє Господь Савао́т. Та говорите ви: „У чо́му пове́рнемось?“ Чи Бога люди́на обманить? Мене ж ви обма́нюєте, ще й говорите: „Чи́м ми Тебе обмани́ли?“ — Десяти́ною та прино́сами! Прокля́ттям ви про́кляті, а Мене обмани́ли, о люду ти ввесь!"},"wrongAnswers":["Ісаїя","Єремія","Михей"],"gameTopic":"prophets","ladderStep":6},{"question":"Перед ким Мордехай відмовився схилятися?","answer":"Аман","categories":["old_testament"],"reference":"Esther","reference_uk":null,"ogienko":{"loc":"Естер 1:1-8","text":""},"wrongAnswers":["Артаксеркс","Зереш","Вігтан"],"gameTopic":"ot_general","ladderStep":5},{"question":"Скільки Даниїл перебував у рові з левами?","answer":"Одну ніч","categories":["old_testament","prophets","miracles"],"reference":"Daniel 6","reference_uk":"Даниїл 6:1","ogienko":{"loc":"Даниїл 6:1","text":"А мі́дянин Да́рій оде́ржав царство в віці шостидесяти́ й двох ро́ків. Сподо́балося Дарієві, і він поставив над царством сто й двадцять сатра́пів, щоб були над усім царством. А вище від них — три найвищі урядники, що одним із них був Даниїл, яким ці сатра́пи здавали звіт, а цар щоб не був пошкодо́ваний. Тоді цей Даниїл блищав над найвищими урядниками та сатра́пами, бо в ньому був високий дух, і цар заду́мував поставити його над усім царством. Тоді найвищі урядники та сатра́пи стали шукати причини оска́ржити Даниїла в справі царства, але жодної причини чи ва́ди знайти не могли́, бо той був вірний, і жодна по́милка чи вада не була зна́йдена на нього."},"wrongAnswers":["Сім діб","Три доби","Два дні"],"gameTopic":"miracles","ladderStep":4},{"question":"Яка тварина найчастіше згадується в Старому й Новому Завітах? (за тією ж базою)","answer":"Вівця","categories":["old_testament","new_testament"],"reference":"-nil-","reference_uk":null,"ogienko":null,"wrongAnswers":["Кінь","Голуб","Віл"],"gameTopic":"nt_general","ladderStep":8},{"question":"Скільки Йона пробув у череві «кита»?","answer":"Три дні й три ночі","categories":["old_testament","prophets"],"reference":"Jonah 1:17","reference_uk":"Йона 2:1","ogienko":{"loc":"Йона 2:1","text":"І призна́чив Госпо́дь велику рибу, щоб вона проковтну́ла Йону. І був Йона в сере́дині цієї риби три дні та три ночі."},"wrongAnswers":["Чотири дні","Дві доби","Сім днів"],"gameTopic":"prophets","ladderStep":4},{"question":"Який вавилонський цар кинув Даниїла до левів за молитву до Бога?","answer":"Дарій Мідянин","categories":["old_testament","prophets","kings_judges","miracles"],"reference":"Daniel 6","reference_uk":"Даниїл 6:1","ogienko":{"loc":"Даниїл 6:1","text":"А мі́дянин Да́рій оде́ржав царство в віці шостидесяти́ й двох ро́ків. Сподо́балося Дарієві, і він поставив над царством сто й двадцять сатра́пів, щоб були над усім царством. А вище від них — три найвищі урядники, що одним із них був Даниїл, яким ці сатра́пи здавали звіт, а цар щоб не був пошкодо́ваний. Тоді цей Даниїл блищав над найвищими урядниками та сатра́пами, бо в ньому був високий дух, і цар заду́мував поставити його над усім царством. Тоді найвищі урядники та сатра́пи стали шукати причини оска́ржити Даниїла в справі царства, але жодної причини чи ва́ди знайти не могли́, бо той був вірний, і жодна по́милка чи вада не була зна́йдена на нього."},"wrongAnswers":["Навуходоносор","Кір","Валтасар"],"gameTopic":"judges_kings","ladderStep":8},{"question":"Яку зброю, за описом у Біблії, ніс філістимлянин Голіаф, коли його вразив Давид? (_____ та _____)","answer":"Меч і спис","categories":["old_testament","kings_judges"],"reference":"1 Samuel 17:45","reference_uk":"1-а Самуїлова 17:45","ogienko":{"loc":"1-а Самуїлова 17:45","text":"І сказав Давид до филисти́млянина: „Ти йдеш на мене з мечем і списом та ра́тищем, а я йду на тебе в Ім'я́ Господа Савао́та, Бога військ Ізра́їлевих, які́ ти знева́жив. Сьогодні віддасть тебе Господь у мою ру́ку, — і я поб'ю́ тебе́, і відітну́ голову твою з тебе, і дня цього я дам па́дло филистимського табо́ру птаству небесному та земній звірині́. І пізнає вся земля, що є Бог Ізраїлів! І пізнає вся громада те, що Господь спасає не мече́м та списом, — бо це війна Господа, і Він віддасть вас у нашу руку“. І сталося, коли филисти́млянин устав і пішов, і збли́зився до Давида, то Давид поспішив і побіг до ла́ви навпроти филисти́млянина. І простя́г Давид руку свою до то́рби, і взяв звідти ка́меня, та й кинув із пращі, — і вдарив филисти́млянина в чоло́ його. І той камінь втявся йому в чоло́, — і він упав на обличчя своє на землю."},"wrongAnswers":["Спис і щит","Лук і стріли","Булава й кинджал"],"gameTopic":"judges_kings","ladderStep":6},{"question":"Яке найдовше ім’я в Біблії?","answer":"Магер-Шалал-Хаш-Баз","categories":["old_testament"],"reference":"Isaiah 8:3","reference_uk":"Ісая 8:3","ogienko":{"loc":"Ісая 8:3","text":"І збли́зився я до пророчиці, і вона зачала́, і породила сина. Господь же до мене промовив: Назви ім'я́ йому: Магер-шалал-хаш-баз."},"wrongAnswers":["Навуходоносор","Мелхіседек","Зерах-Баал"],"gameTopic":"ot_general","ladderStep":2},{"question":"Хто прийшов до Захарія з вістю, що дружина матиме дитину?","answer":"Ангел Гавриїл","categories":["new_testament","gospels"],"reference":"Luke 1:19","reference_uk":"Вiд Луки 1:19","ogienko":{"loc":"Вiд Луки 1:19","text":"А ангол прорік йому в відповідь: „Я Гавриїл, що стою перед Богом; мене по́слано, щоб говорити з тобою, і звістити тобі про цю Добру Нови́ну. І замовкнеш ось ти, і говорити не зможеш аж до дня, коли станеться це, за те, що ти віри не йняв був словам моїм, які збудуться ча́су свого́!“ А люди чекали Захарія, та й дивувались, чого́ забаривсь він у храмі. Коли ж вийшов, не міг говорити до них, і вони зрозуміли, що видіння він бачив у храмі. А він тільки знаки́ їм давав, — і залиши́вся німий. І як дні його служби скінчи́лись, він вернувся до дому свого́."},"wrongAnswers":["Михаїл","Уріїл","Іван"],"gameTopic":"gospels","ladderStep":5},{"question":"Скільки в Біблії «перлинових» брам?","answer":"12","categories":["new_testament"],"reference":"Revelation 21:12-21","reference_uk":"Об'явлення 21:12","ogienko":{"loc":"Об'явлення 21:12","text":"Мур воно мало великий і високий, мало дванадцять брам, а на брамах дванадцять анголів та ймення написані, а вони — імення дванадцятьо́х племе́н синів Ізраїля. Від схо́ду три брамі, і від пі́вночі три брамі, і від півдня три брамі, і від захо́ду три брамі. І міськи́й мур мав дванадцять підвалин, а на них дванадцять імен дванадцяти апо́столів Агнця. А той, хто зо мною говорив, мав міру, — золоту трости́ну, щоб змі́ряти місто, і брами його і його мур. А місто чотирикутнє, а довжина́ його така, як і ширина́. І він зміряв місто трости́ною на дванадцять тисяч стадій;[16] довжина́, і ширина́, і вишина́ його рівні."},"wrongAnswers":["10","24","7"],"gameTopic":"nt_general","ladderStep":6},{"question":"Який із чотирьох вершників Апокаліпсиси їде на червоному коні?","answer":"Війна","categories":["new_testament"],"reference":"Revelation 6:1-8","reference_uk":"Об'явлення 6:1","ogienko":{"loc":"Об'явлення 6:1","text":"І я бачив, що Агнець розкрив одну з семи печаток, і почув я одну з чотирьох тих тварин, яка говорила, як голосом грому: „Підійди́!“ І я глянув, — і ось кінь білий, а той, хто на ньому сидів, мав лука. І вінця́ йому да́но, і він вийшов, немов переможець, і щоб перемогти. І коли другу печатку розкрив, я другу тварину почув, що казала: „Підійди!“ І вийшов кінь другий, — червоний. А тому, хто на ньому сидів, було да́но взяти мир із землі та щоб убивали один о́дного. І меч великий був да́ний йому. І коли третю печатку розкрив, я третю тварину почув, що казала: „Підійди!“ І я глянув, — і ось кінь ворони́й. А той, хто на ньому сидів, мав вагу́ в своїй руці."},"wrongAnswers":["Голод","Смерть","Чума"],"gameTopic":"nt_general","ladderStep":8},{"question":"Якого кольору кінь вершника «Війна»?","answer":"Червоний","categories":["new_testament"],"reference":"Revelation 6:1-8","reference_uk":"Об'явлення 6:1","ogienko":{"loc":"Об'явлення 6:1","text":"І я бачив, що Агнець розкрив одну з семи печаток, і почув я одну з чотирьох тих тварин, яка говорила, як голосом грому: „Підійди́!“ І я глянув, — і ось кінь білий, а той, хто на ньому сидів, мав лука. І вінця́ йому да́но, і він вийшов, немов переможець, і щоб перемогти. І коли другу печатку розкрив, я другу тварину почув, що казала: „Підійди!“ І вийшов кінь другий, — червоний. А тому, хто на ньому сидів, було да́но взяти мир із землі та щоб убивали один о́дного. І меч великий був да́ний йому. І коли третю печатку розкрив, я третю тварину почув, що казала: „Підійди!“ І я глянув, — і ось кінь ворони́й. А той, хто на ньому сидів, мав вагу́ в своїй руці."},"wrongAnswers":["Білий","Чорний","Вороний"],"gameTopic":"nt_general","ladderStep":8},{"question":"Який вершник їде на блідому (сірому) коні?","answer":"Смерть","categories":["new_testament"],"reference":"Revelation 6:1-8","reference_uk":"Об'явлення 6:1","ogienko":{"loc":"Об'явлення 6:1","text":"І я бачив, що Агнець розкрив одну з семи печаток, і почув я одну з чотирьох тих тварин, яка говорила, як голосом грому: „Підійди́!“ І я глянув, — і ось кінь білий, а той, хто на ньому сидів, мав лука. І вінця́ йому да́но, і він вийшов, немов переможець, і щоб перемогти. І коли другу печатку розкрив, я другу тварину почув, що казала: „Підійди!“ І вийшов кінь другий, — червоний. А тому, хто на ньому сидів, було да́но взяти мир із землі та щоб убивали один о́дного. І меч великий був да́ний йому. І коли третю печатку розкрив, я третю тварину почув, що казала: „Підійди!“ І я глянув, — і ось кінь ворони́й. А той, хто на ньому сидів, мав вагу́ в своїй руці."},"wrongAnswers":["Голод","Війна","Життя"],"gameTopic":"nt_general","ladderStep":8},{"question":"Хто сповістив учнів, що Ісус воскрес?","answer":"Марія Магдалина","categories":["new_testament","gospels"],"reference":"Matthew 28:1-10, John 20:1-10","reference_uk":"Вiд Матвiя 28:1","ogienko":{"loc":"Вiд Матвiя 28:1","text":"Як минула ж субота, на світанку дня першого в тижні,[114] прийшла Марія Магдалина та інша Марія побачити гріб. І великий ось ставсь землетру́с, бо зійшов із неба Ангол Господній, і, приступивши, відвалив від гробу ка́меня, та й сів на ньому. Його ж постать була́, як та бли́скавка, а шати його були білі, як сніг. І від стра́ху перед ним затряслася сторо́жа, та й стала, як мертва. А ангол озвався й промовив жінка́м: „Не лякайтеся, бо я знаю, що Ісуса розп'я́того це ви шукаєте."},"wrongAnswers":["Петро","Саломія","Марта"],"gameTopic":"gospels","ladderStep":5},{"question":"Скільки разів Петро зрікся Ісуса?","answer":3,"categories":["new_testament","gospels"],"reference":"Matthew 26:33-35, Mark 14:29-31, Luke 22:33-34, John 13:36-38","reference_uk":"Вiд Матвiя 26:33","ogienko":{"loc":"Вiд Матвiя 26:33","text":"А Петро відповів і сказав Йому: „Якби й усі спокуси́лись про Тебе, — я не спокушу́ся ніко́ли“. Промовив до нього Ісус: „Поправді кажу́ тобі, що ночі цієї, перше ніж заспіває півень, — відречешся ти тричі від Мене“. Говорить до Нього Петро: „Коли б мені навіть умерти з Тобою, — я не відречуся від Тебе!“ Так сказали й усі учні. Тоді з ними приходить Ісус до місцевости, званої Гефсима́нія, і промовляє до учнів: „Посидьте ви тут, аж поки піду́ й помолюся отам“. І, взявши Петра й двох синів Зеведе́євих, зачав сумувати й тужити."},"wrongAnswers":["2","4","1"],"gameTopic":"gospels","ladderStep":4},{"question":"Хто втік з Іконія, дізнавшись про змову побити їх каменем? (___ та ____, за абеткою)","answer":"Варнава й Павло","categories":["new_testament"],"reference":"Acts 14:5-6","reference_uk":"Дiї 14:5","ogienko":{"loc":"Дiї 14:5","text":"Коли ж кинулися ті погани й юдеї з своїми старши́ми, щоб зневажити їх та камінням побити, то, дізнавшись про це, вони повтікали до міст лікао́нських, до Лі́стри та Де́рвії, та в околиці їхні, і Єва́нгелію там звіща́ли. А в Лі́стрі сидів один чоловік, безвладний на ноги, що кривий був з утроби своєї матері, і ніко́ли ходити не міг. Він слухав, як Павло́ говорив, який пильно на нього споглянув, і побачив, що має він віру вздоровленим бути,"},"wrongAnswers":["Петро і Яків","Тимофей і Сила","Марко й Лука"],"gameTopic":"nt_general","ladderStep":9},{"question":"Хто був першим царем Ізраїля?","answer":"Саул","categories":["old_testament","kings_judges"],"reference":"1 Samuel 10:1","reference_uk":"1-а Самуїлова 10:1","ogienko":{"loc":"1-а Самуїлова 10:1","text":"І взяв Самуїл посу́динку оливи, та й вилляв на його го́лову, і поцілував його та й сказав: „Чи це не пома́зав тебе Господь над спа́дком Своїм на володаря?[14] (І будеш ти царюва́ти над народом Господнім, і ти ви́зволиш його від руки ворогів його навко́ло. І ось тобі озна́ка, що Господь пома́зав тебе над спа́дком Своїм на володаря.) Як пі́деш ти сьогодні від мене, то при Рахи́линім гро́бі, у Веніями́новій країні в Целцаху, зна́йдеш двох людей, і вони скажуть тобі: Зна́йдені ті ослиці, яких ти шукати ходив. А оце ба́тько твій занеха́яв справи тих ослиць, та й зажури́вся за вас, говорячи: Що́ я зроблю для свого сина? І пере́йдеш ти звідти й далі, і пі́деш аж до дібро́ви Фаво́рської, а там зна́йдуть тебе три чоловіки, що йдуть до Бога до Бет-Елу, — один несе трьох ягнят, а один несе три буханці́ хліба, а один несе бурдюка́ вина. І запитають вони тебе про мир,[15] та дадуть тобі два хлі́би, і ти ві́зьмеш із їхньої руки. Потому ви́йдеш ти на Божий[16] горбок, де намісники филистимські. І станеться, як ти ввійдеш там до міста, то стрі́неш громаду пророків, що сходять з па́гірка, а перед ними а́рфа, та бу́бон, та сопі́лка, та ци́тра, і вони пророку́ють."},"wrongAnswers":["Давид","Соломон","Ровоам"],"gameTopic":"judges_kings","ladderStep":3},{"question":"На яке дерево зліз Закхей, щоб побачити Ісуса в Єрихоні?","answer":"фіґа","categories":["new_testament","gospels"],"reference":"Luke 19:1-4","reference_uk":"Вiд Луки 19:1","ogienko":{"loc":"Вiд Луки 19:1","text":"І, ввійшовши Ісус, переходив через Єрихо́н. І ось чоловік, що звався Закхе́й, — він був старши́й над ми́тниками, і був багатий, — бажав ба́чити Ісуса, хто Він, але з-за наро́ду не міг, — бо мали́й був на зріст. І, забігши вперед, він виліз на фіґове дерево, щоб бачити Його, бо Він мав побіч нього прохо́дити. А коли на це місце Ісус підійшов, то поглянув уго́ру до нього й промовив: „Закхе́ю, — зійди за́раз додо́лу, бо сьогодні потрібно Мені бути в домі твоїм!“"},"wrongAnswers":["Олива","Фінік","Кедр"],"gameTopic":"gospels","ladderStep":7},{"question":"Хто міг тлумачити сни Навуходоносора?","answer":"Даниїл","categories":["old_testament","prophets","kings_judges","miracles"],"reference":"Daniel 2","reference_uk":"Даниїл 2:1","ogienko":{"loc":"Даниїл 2:1","text":"А за другого року Навуходоносорового царюва́ння присни́лися Навуходоносорові сни. І занепоко́ївся дух його, і сон його утік від нього. І сказав цар покли́кати чарівникі́в та заклиначі́в, і чаклуні́в та халде́їв, щоб розповіли́ царе́ві його сни. І вони поприхо́дили, і поставали перед царськи́м обличчям. І сказав до них цар: „Снився мені сон, і занепоко́ївся дух мій, щоб пізнати той сон.“ А халде́ї говорили царе́ві по-араме́йському:[2] „Ца́рю, живи навіки! Розкажи перше сон своїм рабам, а ми об'явимо ро́зв'язку“.[3] Цар відповів та й сказав до халдеїв: „Моє слово невідкличне: якщо ви не розповісте́ мені сна та його ро́зв'язку, будете почетверто́вані, а ваші доми обе́рнуться в руїни."},"wrongAnswers":["Йосип","Мойсей","Валтасар"],"gameTopic":"judges_kings","ladderStep":3},{"question":"Хто був паном Йосипа в Єгипті (Буття 37:36)?","answer":"Потіфар","categories":["old_testament"],"reference":"Genesis 37:36","reference_uk":"Буття 37:36","ogienko":{"loc":"Буття 37:36","text":"А мідіяніти продали Йо́сипа до Єгипту, до Потіфара, царедворця фараонового, начальника царсько́ї сторожі."},"wrongAnswers":["Фараон","Сіфра","Йосип"],"gameTopic":"ot_general","ladderStep":4},{"question":"Який учень був митником?","answer":"Матвій","categories":["new_testament","gospels"],"reference":"Matthew 10:3, Mark 2:14, Luke 5:27","reference_uk":"Вiд Матвiя 10:3","ogienko":{"loc":"Вiд Матвiя 10:3","text":"Пилип і Вартоломе́й, Хома́ й ми́тник Матвій; Яків, син Алфе́їв, і Таде́й; Си́мон Кананіт, та Юда Іскаріо́тський,[41] що й видав Його. Цих Дванадцятьо́х Ісус вислав, і їм наказав, промовляючи: „На путь до поган не ходіть, і до самаря́нського міста не входьте, але йдіть радніш до овечок загинулих дому Ізра́їлевого. А ходячи, проповідуйте та говоріть, що набли́зилось Царство Небесне."},"wrongAnswers":["Закхей","Левій","Симон"],"gameTopic":"gospels","ladderStep":3},{"question":"Який цар Юдеї захворів на проказу?","answer":"Озія","categories":["old_testament","kings_judges"],"reference":"2 Kings 15:5 (also known as Azariah)","reference_uk":"2-а царiв 15:5","ogienko":{"loc":"2-а царiв 15:5","text":"І вдарив Господь царя, і він був прокаже́ний аж до дня своєї смерти, і сидів ув осібному домі. А над домом був Йотам, царів син, — він судив народ Кра́ю. А решта діл Азарії та все, що він робив, — ось вони написані в Книзі Хроніки Юдиних царів. І спочив Азарія з своїми батьками, і його поховали з його батьками в Давидовому Місті, а замість нього зацарював син його Йотам. Тридцятого й восьмого року Азарії, Юдиного царя, зацарював над Ізраїлем у Самарії Захарій, син Єровоама, на шість місяців. І робив він зле в Господніх оча́х, як робили батьки його, — не відступився від гріхів Єровоама, Неватового сина, що вводив у гріх Ізраїля."},"wrongAnswers":["Єзекія","Манасія","Ахаз"],"gameTopic":"judges_kings","ladderStep":5},{"question":"Який цар Ізраїля славився швидкою їздою на колісниці?","answer":"Їгу","categories":["old_testament","kings_judges"],"reference":"2 Kings 9:20","reference_uk":"2-а царiв 9:20","ogienko":{"loc":"2-а царiв 9:20","text":"І доніс вартови́й, говорячи: „Прийшов він аж до них, та не вернувся. А кі́нна їзда́, як їзда Єгу, Німшієвого сина, бо їде несамовито“. І сказав Єгорам: „Запрягай!“ І запріг його колесни́цю. І відправився Єгорам, Ізраїлів цар, та Ахазія, Юдин цар, кожен своєю колесни́цею, щоб зустріти Єгу, — і спітка́ли його в діля́нці їзреелянина Навота. І сталося, як Єгорам побачив Єгу, то сказав: „Чи все гаразд, Єгу?“ А той відказав: „Який гаразд при пере́любі твоєї матері Єзавелі та її багатьох чарів?“ І обернув Єгорам руки свої та й утік. І сказав він Ахазії: „Зра́да, Ахазіє!“ А Єгу взяв лука в руку свою, і вдарив Єгорама між його раме́нами, — і проби́ла стріла його серце, і він похили́вся на колесни́ці своїй..."},"wrongAnswers":["Ахав","Їорам","Охозія"],"gameTopic":"judges_kings","ladderStep":8},{"question":"Що сталося, коли Йонатан і його зброєносець напали на філістимлян?","answer":"Землетрус","categories":["old_testament","kings_judges","miracles"],"reference":"1 Samuel 14:11-15","reference_uk":"1-а Самуїлова 14:11","ogienko":{"loc":"1-а Самуїлова 14:11","text":"І вони обидва показалися филистимській сторо́жі. І сказали филисти́мляни: „Ось виходять із щі́лин євреї, що поховалися там“. І люди зало́ги відповіли́ Йоната́нові та його зброєноші та й сказали: „Підіймися до нас, — і ми вам щось скажемо!“ І сказав Йонатан зброєноші своєму: „Підіймайся за мною, бо Господь дав їх у Ізраїлеву руку!“ І піднявся Йонатан на руках своїх та на ногах своїх, а за ним його зброєно́ша. І падали филисти́мляни перед Йонатаном, а його зброєноша добивав за ним. І була́ перша пора́зка, що вдарив Йонатан та його зброєноша, близько двадцяти чоловіка, на половині скиби оброблюваного парою волів поля на день. І стався споло́х у табо́рі, на полі, та в усьому народі. Зало́га та нищи́телі — затремтіли й вони. І задрижала земля, і знявся великий споло́х!"},"wrongAnswers":["Гром і блискавка","Сильний дощ","Раптовий потік"],"gameTopic":"judges_kings","ladderStep":8},{"question":"Хто збудував перший жертівник після потопу?","answer":"Ной","categories":["old_testament"],"reference":"Genesis 8:20","reference_uk":"Буття 8:20","ogienko":{"loc":"Буття 8:20","text":"І збудував Ной жертівника Господе́ві. І взяв він із кожної чистої худоби й з кожного чистого птаства, і приніс на жертівнику цілопа́лення. І почув Господь пахощі любі, і в серці Своєму промовив: „Я вже більше не буду землі проклинати за людину, бо нахил людського серця лихий від віку його молодого. І вже більше не вбиватиму всього живого, як то Я вчинив був. Надалі, по всі дні землі, сівба та жнива, і холоднеча та спека, і літо й зима, і день та ніч — не припиняться!“"},"wrongAnswers":["Аврам","Сим","Єнох"],"gameTopic":"ot_general","ladderStep":4},{"question":"Скільки шеклів дав Авраам за поле Махпела?","answer":400,"categories":["old_testament"],"reference":"Genesis 23:16","reference_uk":"Буття 23:16","ogienko":{"loc":"Буття 23:16","text":"І послухав Авраам Ефрона. І відважив Авраам Ефронові срібло, про яке той був сказав, так що чули сини Хетові, — чотири сотні шеклів срібла купецької ваги. І стало поле Ефронове, що в Махпелі воно, що перед Мамре, поле й печера, що на ньому, і кожне дерево, що в полі, що в усій границі його навколо, купном Авраамові в присутності синів Хетових, усіх, хто входив до брами міста його. І по цьому Авраам поховав Сарру, жінку свою, в печері поля Махпели, перед Мамре, — це Хеврон у землі ханаанській. І стало поле й печера, що на нім, Авраамові на власність для гробу від синів Хетових."},"wrongAnswers":["300","500","450"],"gameTopic":"ot_general","ladderStep":7},{"question":"Під яким деревом спав Ілля, коли втікав від Ізавелі?","answer":"Ялівець","categories":["old_testament","prophets","kings_judges"],"reference":"1 Kings 19:5","reference_uk":"1-а царiв 19:5","ogienko":{"loc":"1-а царiв 19:5","text":"І поклався він, і заснув під одним ялівце́м. Аж ось Ангол діткнувся його та й сказав йому: „Устань та попоїж!“ І глянув він, аж ось у його голова́х кала́ч, спечений на вугіллі, та дзба́нок води. І він їв та пив, і зно́ву поклався. І вернувся Ангол Господній удруге, і діткнувся його та й сказав: „Устань, попоїж, бо дорога тяжка́ перед тобою“. І він устав, і попоїв та напився. І він ішов, підкрі́плений тією їжею, сорок день та сорок ноче́й аж до Божої гори Хори́в. І прибу́в він туди до печери, і переночува́в там, аж ось Господнє слово до нього. І сказав Він йому: „Чого́ ти тут, Іллє́?“"},"wrongAnswers":["Дуб","Олива","Кедр"],"gameTopic":"judges_kings","ladderStep":7},{"question":"За скільки срібняків Юда зрадив Ісуса? (повтор у базі)","answer":30,"categories":["new_testament","gospels"],"reference":"Matthew 26:15","reference_uk":"Вiд Матвiя 26:15","ogienko":{"loc":"Вiд Матвiя 26:15","text":"і сказав: „Що́ хочете дати мені, — і я вам Його видам?“ І вони йому виплатили тридцять срібняків.[93] І він відтоді шукав слу́шного ча́су, щоб видати Його. А першого дня Опрі́сноків учні підійшли до Ісуса й сказали Йому: „Де́ хочеш, щоб ми приготува́ли пасху спожити Тобі? А Він відказав: „Ідіть до такого то в місто, і перекажіть йому: каже Вчитель: час Мій близьки́й, — справлю Пасху з Своїми учнями в тебе“. І учні зробили, як звелів їм Ісус, і зачали́ пасху готува́ти."},"wrongAnswers":["20","25","50"],"gameTopic":"gospels","ladderStep":1},{"question":"Назвіть батька Давида (повтор у базі)","answer":"Єссе́й","categories":["old_testament","kings_judges"],"reference":"1 Samuel 17:12","reference_uk":"1-а Самуїлова 17:12","ogienko":{"loc":"1-а Самуїлова 17:12","text":"А Давид — син того мужа ефра́тянина, з Юдиного Віфлеєму, а ім'я́ йому Єссе́й, що мав во́сьмеро синів. І цей чоловік за Саулових днів був стари́й, увійшов у літа. І пішли троє найстарших Єссеєвих синів, пішли за Саулом на війну́. А імена́ трьох синів його, що пішли на війну: перворідний Еліяв, а другий його — Авінадав, а третій — Шамма. А Давид — він найменший, а три найстарші пішли за Саулом. А Давид ходив до Саула, та вертався па́сти отару свого батька в Віфлеємі. А той филисти́млянин підхо́див ранком та ввечорі, і виступав сорок день."},"wrongAnswers":["Саул","Вооз","Нер"],"gameTopic":"judges_kings","ladderStep":4},{"question":"Єдина книга Біблії, де прямо не згадується Бог — яка?","answer":"Естер","categories":["old_testament"],"reference":"Esther","reference_uk":null,"ogienko":{"loc":"Естер","text":""},"wrongAnswers":["Рут","Псалми","Притчі"],"gameTopic":"ot_general","ladderStep":3},{"question":"За скільки срібняків брати продали Йосипа ісмаїлітам?","answer":20,"categories":["old_testament"],"reference":"Genesis 37:28","reference_uk":"Буття 37:28","ogienko":{"loc":"Буття 37:28","text":"І коли прохо́дили мідіяніти, купці, то витягли й підняли Йо́сипа з ями. І продали Йосипа ізмаїльтянам за двадцять срібняків, а ті повели Йосипа до Єгипту. А Рувим вернувся до ями, — аж нема Йосипа в ямі! І розірвав він одежу свою... І вернувся він до братів своїх, та й сказав: „Немає хло́пця! А я, —— куди я піду́?“ А вони взяли Йо́сипове вбрання́, і зарізали козла, і вмочили вбрання в кров. І послали вони квітчасте вбрання, і принесли до свого батька, та й сказали: „Оце ми знайшли. Пізнай но, чи це вбрання — твого сина воно, чи ні?“"},"wrongAnswers":["30","15","25"],"gameTopic":"ot_general","ladderStep":5},{"question":"Скільки апостолів обрав Ісус?","answer":"12","categories":["new_testament","gospels"],"reference":"Luke 6:13","reference_uk":"Вiд Луки 6:13","ogienko":{"loc":"Вiд Луки 6:13","text":"А коли настав день, покликав Він у́чнів Своїх, і обрав із них Дванадцятьо́х, яких і апо́столами Він назвав: Си́мона, якого й Петром Він назвав, і Андрія, брата його, Якова й Івана, Пилипа й Варфоломі́я, Матвія й Хому́, Якова Алфі́євого й Си́мона, зва́ного Зило́том,[15] Юду Якового, й Юду Іскаріо́тського, що й зрадником став. Як зійшов Він із ними, то спинився на рівному місці, також на́товп густий Його у́чнів, і бе́зліч людей з усіє́ї Юдеї та з Єрусалиму, і з примо́рського Тиру й Сидо́ну,"},"wrongAnswers":["11","10","13"],"gameTopic":"gospels","ladderStep":1},{"question":"Ангел сказав Марії, що Ісус царюватиме над домом якого старозавітного патріарха?","answer":"Яків","categories":["old_testament","new_testament","gospels"],"reference":"Luke 1:33","reference_uk":"Вiд Луки 1:33","ogienko":{"loc":"Вiд Луки 1:33","text":"І повік царюватиме Він у домі Якова, і царюва́нню Його не буде кінця“. А Марія озвалась до ангола: „Як же станеться це, коли мужа не знаю?“ І ангол промовив у відповідь їй: „Дух Святий зли́не на тебе, і Всеви́шнього сила обго́рне тебе, через те то й Святе, що наро́диться, бу́де Син Божий! А ото твоя родичка Єлисаве́та — і вона зачала́ в своїй старості сина, і оце шостий місяць для неї, яку звуть неплідною. Бо „для Бога нема неможливої жодної речі!“"},"wrongAnswers":["Авраам","Мойсей","Давид"],"gameTopic":"gospels","ladderStep":9},{"question":"Який пророк сказав: «З Єгипту покликав Я Сина Свого»?","answer":"Осія","categories":["old_testament","prophets"],"reference":"Hosea 11:1","reference_uk":"Осiя 11:1","ogienko":{"loc":"Осiя 11:1","text":"Як Ізраїль був хлопцем, Я його покохав, і з Єгипту покликав Я сина Свого́. Як часто їх кликав, так вони йшли від Мене, — прино́сили жертви Ваа́лам, і кадили бовва́нам. Я ж Єфрема ходити навчав, Я їх брав на раме́на Свої, та не знали вони, що Я їх лікува́в. Я тягнув їх шнурка́ми, що лю́дям лицю́ють, шнурка́ми любови, і був Я для них немов ті, що здіймають ярмо́ з-над їхньої шиї, і Я їх годував. До кра́ю єгипетського він не ве́рнеться, та Ашшур[15] — він буде для нього царем, бо вони не хотіли верну́тись до Мене."},"wrongAnswers":["Ісаїя","Єремія","Йоїл"],"gameTopic":"prophets","ladderStep":8},{"question":"Яке дерево прокляв Ісус?","answer":"фіґа","categories":["new_testament","miracles"],"reference":"Mark 11:12-14","reference_uk":"Вiд Марка 11:12","ogienko":{"loc":"Вiд Марка 11:12","text":"А назавтра, коли вони вийшли з Віфа́нії, Він зголодні́в. І, побачивши зда́лека фіґове дерево, вкрите листями, Він підійшов, чи не зна́йде на ньому чого́. І, прийшовши до нього, не знайшов нічого, крім листя само́го, — не пора бо на фіґи була́. І озвався Ісус і промовив до нього: „Щоб більше ніхто твого пло́ду не з'їв аж повіки!“ А учні Його все те чули. І прийшли вони в Єрусалим. А як Він у храм увійшов, то став виганяти продавців і покупців у храмі, і попереверта́в столи грошомі́нам та осло́ни — продавцям голубів. І Він не дозволяв, щоб хто річ яку носив через храм."},"wrongAnswers":["Сиквоя","Виноград","Дуб"],"gameTopic":"miracles","ladderStep":1},{"question":"Кого Саул просив викликати через ворожку?","answer":"Самуїл","categories":["old_testament","prophets","kings_judges"],"reference":"1 Samuel 28:11","reference_uk":"1-а Самуїлова 28:11","ogienko":{"loc":"1-а Самуїлова 28:11","text":"І сказала та жінка: „Кого я ви́кличу тобі?“ А він відказав: „Самуїла виклич мені“. І побачила та жінка Самуїла, та й крикнула сильним голосом! І сказала та жінка до Саула, говорячи: „Нащо ти обманив мене, — таж ти Саул!“ І сказав їй цар; „Не бійся! Але що́ ти бачиш?“ А та жінка відказала Саулові: „Я бачу ніби богів, що виходять із землі!“ І він їй сказав: „Який його вид?“ А та відказала: „Виходить стари́й чоловік, зодя́гнений у довгу одежу“. І Саул пізнав, що то Самуїл, і схилив своє обличчя до землі, та й уклонився. І сказав Самуїл до Саула: „На́що ти непоко́їш мене, мене викликаючи?“ А Саул сказав: „Дуже тяжко мені, — филисти́мляни воюють зо мною, а Бог відступився від мене, і не відповідає мені вже ані через пророків, ані в снах. І покликав я тебе, щоб ти навчив мене, що́ я маю робити“."},"wrongAnswers":["Ілля","Даниїл","Натан"],"gameTopic":"judges_kings","ladderStep":4},{"question":"З якого псалма рядки про зелені пасовища й тихі води?","answer":"23","categories":["old_testament","psalms_"],"reference":"Psalm 23:2","reference_uk":"Псалми 23:2","ogienko":{"loc":"Псалми 23:2","text":"бо заклав Він її на моря́х, і на річках її встанови́в. Хто зі́йде на го́ру Господню, і хто бу́де стояти на місці святому Його? — У кого́ чисті руки та щиреє серце, і хто не нахиля́в на марно́ту своєї душі, і хто не присягав на обма́ну, нехай но́сить він благослове́ння від Господа, а праведність — від Бога спасі́ння свого! Таке поколі́ння усіх, хто шукає Його́, хто пра́гне обличчя Твого́, Боже Яковів! Се́ла."},"wrongAnswers":["1","91","121"],"gameTopic":"books","ladderStep":9},{"question":"«Страх Господній — початок …» Чого?","answer":"Мудрості","categories":["old_testament","proverbs","psalms"],"reference":"Psalm 111:10, Proverbs 9:10","reference_uk":"Псалми 111:10","ogienko":{"loc":"Псалми 111:10","text":"Це бачить безбожний та гні́вається, скрего́че зубами своїми та та́не. Бажа́ння безбожних загине!"},"wrongAnswers":["Знання","Розуму","Сили"],"gameTopic":"books","ladderStep":4},{"question":"Господь звелів Йоні проповідувати проти якого міста?","answer":"Ніневія","categories":["old_testament","prophets"],"reference":"Jonah 1:2","reference_uk":"Йона 1:2","ogienko":{"loc":"Йона 1:2","text":"„Устань, іди до Ніневі́ї, великого міста, і проповідуй проти нього, бо їхнє зло прийшло перед лице Моє“. І встав Йо́на, щоб утекти до Тарші́шу з-перед Господнього лиця. І зійшов він до Яфи, і знайшов корабля́, що йшов до Тарші́шу, і дав заплату його, і ввійшов у нього, щоб відпли́сти з ними до Таршішу з-перед Господнього лиця. А Госпо́дь кинув сильного вітра на море, — і зняла́ся на морі велика буря, і вже ду́мали, що корабель буде розбитий. І налякалися моряки́, і кликали кожен до своїх богі́в, і викидали ті речі, що були́ на кораблі, до моря, щоб полегши́ти себе. А Йо́на зійшов до спо́ду корабля́, і ліг, і заснув. І приступив до нього керівни́к корабля, та й сказав йому: „Чого ти спиш? Уставай, заклич до свого Бога, — може згадає цей Бог про нас, і ми не зги́немо“."},"wrongAnswers":["Содом","Тір","Вавилон"],"gameTopic":"cities","ladderStep":5},{"question":"Яка з цих книг у Біблії йде першою: до Филип’ян, до Колоссян, до Галатів чи до ефесян?","answer":"До Галатів","categories":["new_testament","letters_of_paul"],"reference":"Contents page","reference_uk":null,"ogienko":null,"wrongAnswers":["До Филип’ян","До Колоссян","До ефесян"],"gameTopic":"letters_paul","ladderStep":9},{"question":"Скільки глав у Посланні до євреїв?","answer":"13","categories":["new_testament","letters_of_paul"],"reference":"Hebrews 1-13","reference_uk":"До євреїв 1:1","ogienko":{"loc":"До євреїв 1-13","text":""},"wrongAnswers":["12","10","14"],"gameTopic":"letters_paul","ladderStep":10},{"question":"Як у Діяннях називають бурю біля Криту?","answer":"Євроклідон","categories":["new_testament","miracles"],"reference":"Acts 27:14","reference_uk":"Дiї 27:14","ogienko":{"loc":"Дiї 27:14","text":"Але незаба́ром ударив на них рвучкий вітер, що зветься евроклі́дон.[38] А коли корабель був підхо́плений, і не міг противитись вітрові, то йому віддались ми й поне́слися. І наїхали ми на один остріве́ць, що Кла́вдою зветься, і чо́вна насилу затримати змогли. Коли ж його витягли, то за́собів допомічни́х добирали й корабля підв'язали. А боявшись, щоб не впасти на Сірт, поспускали вітри́ла, і носилися так. А коли зачала́ буря мі́цно нас ки́дати, то другого дня стали ми розванта́жуватись,"},"wrongAnswers":["Єврика","Левіафан","Шторм"],"gameTopic":"miracles","ladderStep":6},{"question":"Скільки кошів залишилося після годування чотирьох тисяч?","answer":"7","categories":["new_testament","miracles"],"reference":"","reference_uk":"","ogienko":{"loc":"","text":""},"wrongAnswers":["5","12","10"],"gameTopic":"miracles","ladderStep":6},{"question":"Який учень знайшов монету в рибі?","answer":"Петро","categories":["new_testament","miracles"],"reference":"Matthew 17:24-27","reference_uk":"Вiд Матвiя 17:24","ogienko":{"loc":"Вiд Матвiя 17:24","text":"Як прийшли ж вони в Капернау́м, до Петра підійшли збирачі́ дидра́хм на храм, та й сказали: „Чи не запла́тить ваш Учитель дидра́хми?“[71] Він відказує: „Так“. І як він увійшов до дому, то Ісус попере́див його та сказав: „Як ти ду́маєш, Си́моне: царі зе́мні з кого беру́ть мито або пода́тки: від синів своїх, чи чужих?“ А як той відказав: „Від чужих“, то промовив до нього Ісус: „Тож вільні сини! Та щоб їх не спокуси́ти, піди над море, та ву́дку закинь, і яку першу рибу ізло́виш, візьми, і рота відкрий їй, — і зна́йдеш стати́ра;[72] візьми ти його, — і віддай їм за Мене й за себе“."},"wrongAnswers":["Андрій","Яків","Тадей"],"gameTopic":"miracles","ladderStep":6},{"question":"Що Петро знайшов у рибі?","answer":"Монету","categories":["new_testament","miracles"],"reference":"Matthew 17:24–27","reference_uk":"Вiд Матвiя 17:24","ogienko":{"loc":"Вiд Матвiя 17:24","text":"Як прийшли ж вони в Капернау́м, до Петра підійшли збирачі́ дидра́хм на храм, та й сказали: „Чи не запла́тить ваш Учитель дидра́хми?“[71] Він відказує: „Так“. І як він увійшов до дому, то Ісус попере́див його та сказав: „Як ти ду́маєш, Си́моне: царі зе́мні з кого беру́ть мито або пода́тки: від синів своїх, чи чужих?“ А як той відказав: „Від чужих“, то промовив до нього Ісус: „Тож вільні сини! Та щоб їх не спокуси́ти, піди над море, та ву́дку закинь, і яку першу рибу ізло́виш, візьми, і рота відкрий їй, — і зна́йдеш стати́ра;[72] візьми ти його, — і віддай їм за Мене й за себе“."},"wrongAnswers":["Рибу","Їжу","Жетон"],"gameTopic":"miracles","ladderStep":4},{"question":"У якій книзі Біблії розповідають про Амана?","answer":"Естер","categories":["old_testament"],"reference":"Esther 3","reference_uk":"Естер 3:1","ogienko":{"loc":"Естер 3:1","text":"По цих подіях цар Ахашверо́ш звеличив Га́мана, сина Гаммедатового, аґаґ'янина, і пови́щив його, і поставив його крісло понад усіх князі́в, що були з ним. А всі цареві раби, що були в царські́й брамі, падали на коліна та вклонялися Га́манові, бо так про нього наказав цар. А Мордеха́й не падав на коліна й не вклоня́вся. І сказали царські́ раби, що були в царські́й брамі, до Мордеха́я: „Чого ти переступа́єш царе́вого нака́за?“ І сталося, як вони говорили до нього день-у-день, а він не слу́хався їх, то вони доне́сли Га́манові, щоб побачити, чи втри́мається Мордеха́й у своїм слові, бо він виявив їм, що він юде́янин. І побачив Га́ман, що Мордеха́й не падає на коліна й не вклоняється йому́, — і Га́ман перепо́внився лю́тістю..."},"wrongAnswers":["Рут","Буття","Неємія"],"gameTopic":"ot_general","ladderStep":5},{"question":"Названа в Писанні жінка-суддя?","answer":"Девора","categories":["old_testament","kings_judges"],"reference":"Judges 4:4","reference_uk":"Книга Суддiв 4:4","ogienko":{"loc":"Книга Суддiв 4:4","text":"А Дево́ра пророчиця, жінка Лаппідота, — вона судила Ізраїля того ча́су. І сиділа вона під Дево́риною Па́льмою, між Рамою та між Бет-Елом в Єфре́мових гора́х, а Ізраїлеві сини прихо́дили до неї на суд. І вона послала й покликала Бара́ка, Авіноамового сина, з Кедешу Нефтали́мового. І сказала до нього: „Ось наказав Господь, Бог Ізраїлів: Іди, зі́йдеш на го́ру Фаво́р,[6] і ві́зьмеш з собою десять тисяч чоловіка з синів Нефтали́мових та з синів Завуло́нових. А я приведу́ до тебе, до Кішонської долини, Сісе́ру, начальника Явінового ві́йська, і колесни́ці його, і натовп його, та й дам його в твою руку“. І сказав до неї Бара́к: „Якщо ти пі́деш зо мною, то піду́, а якщо не пі́деш зо мною, — не піду́“."},"wrongAnswers":["Авігейл","Естер","Руф"],"gameTopic":"judges_kings","ladderStep":5},{"question":"Як звали дружину царя Агріппи, перед якою ставав Павло на суді?","answer":"Верніка","categories":["new_testament"],"reference":"Acts 25:23","reference_uk":"Дiї 25:23","ogienko":{"loc":"Дiї 25:23","text":"А назавтра Агрі́ппа й Верні́ка прийшли з превеликою пишно́тою, і на залю судо́ву ввійшли разом з тисяцькими та значнішими му́жами міста. І як Фест наказав, то Павло був приве́дений. І сказав до них Фест: „О ца́рю Агріппо, та з нами присутні всі му́жі! Ви бачите того, що за нього ввесь люд юдейський мені докучав в Єрусалимі та тут, кричачи́, що йому не повинно більш жити. Я ж дізнавсь, що нічого, ва́ртого смерти, він не вчинив; а що сам він відкликавсь до Августа, розсудив я послати його. Нічого не маю я певного, що міг би про нього писати до пана. Тому я припровадив його перед вас, а найбільш перед тебе, ца́рю Агріппо, щоб після переслу́хання мав що писати. Бо здається мені нерозва́жливим ув'я́зненого посилати, і не озна́чити обвинува́чень на нього“."},"wrongAnswers":["Друзила","Іродіяда","Клеопатра"],"gameTopic":"nt_general","ladderStep":8},{"question":"Скільки років жив Енох?","answer":365,"categories":["old_testament"],"reference":"Genesis 5:23","reference_uk":"Буття 5:23","ogienko":{"loc":"Буття 5:23","text":"А всіх Енохових днів було́ три сотні літ і шістдесят і п'ять літ. І ходив із Богом Енох, і не стало його, — бо забрав його Бог. І жив Метушалах сто літ і сімдесят і сім літ, та й Ламеха породив. І жив Метушалах по тому, як породив він Ламеха, сім сотень літ і вісімдесят і два роки. І породив він синів та дочок. А всіх Метушалахових днів було́ дев'ять сотень літ і шістдесят і дев'ять літ. Та й помер він."},"wrongAnswers":["300","333","930"],"gameTopic":"ot_general","ladderStep":6},{"question":"Хто найдовше прожив згаданих у Біблії?","answer":"Мафусал","categories":["old_testament"],"reference":"Genesis 5:27","reference_uk":"Буття 5:27","ogienko":{"loc":"Буття 5:27","text":"А всіх Метушалахових днів було́ дев'ять сотень літ і шістдесят і дев'ять літ. Та й помер він. І жив Ламех сто літ і вісімдесят і два роки, та й сина породив, ім'я́ йому назвав: Ной,[29] говорячи: „Цей нас потішить у наших ділах та в труді рук наших коло землі, що Господь її викляв“. І жив Ламех по тому, як Ноя породив, п'ять сотень літ і дев'ятдесят і п'ять літ. І породив він синів та дочок. А всіх Ламехових днів було́ сім сотень літ і сімдесят і сім літ. Та й помер він."},"wrongAnswers":["Ной","Адам","Ламех"],"gameTopic":"ot_general","ladderStep":5},{"question":"Скільки років прожив найстарша людина в Біблії?","answer":969,"categories":["old_testament"],"reference":"Genesis 5:27","reference_uk":"Буття 5:27","ogienko":{"loc":"Буття 5:27","text":"А всіх Метушалахових днів було́ дев'ять сотень літ і шістдесят і дев'ять літ. Та й помер він. І жив Ламех сто літ і вісімдесят і два роки, та й сина породив, ім'я́ йому назвав: Ной,[29] говорячи: „Цей нас потішить у наших ділах та в труді рук наших коло землі, що Господь її викляв“. І жив Ламех по тому, як Ноя породив, п'ять сотень літ і дев'ятдесят і п'ять літ. І породив він синів та дочок. А всіх Ламехових днів було́ сім сотень літ і сімдесят і сім літ. Та й помер він."},"wrongAnswers":["930","850","777"],"gameTopic":"ot_general","ladderStep":5},{"question":"Що означає «Ягве-Шамма» (Єзекіял 48:35)?","answer":"Сам Господь","categories":["old_testament","prophets"],"reference":"Ezekiel 48:35","reference_uk":"Єзекiїль 48:35","ogienko":{"loc":"Єзекiїль 48:35","text":"Навко́ло — вісімнадцять тисяч. А ім'я́ міста з того дня: „Тут Госпо́дь“.[49]"},"wrongAnswers":["Господь з нами","Господь-бойовник","Сіон святий"],"gameTopic":"prophets","ladderStep":7},{"question":"Скільки років життя додав Бог Єзекії на молитву вмираючого царя?","answer":"15","categories":["old_testament","kings_judges"],"reference":"2 Kings 20:6","reference_uk":"2-а царiв 20:6","ogienko":{"loc":"2-а царiв 20:6","text":"І до днів твоїх Я дода́м п'ятнадцять літ, і з руки асирійського царя врятую тебе та це місто, й обороню́ це місто ради Себе та ради раба Свого Давида“. А Ісая сказав: „Візьміть грудку фіґ“. І взяли́ й поклали на того гнояка́, — і він ви́дужав... І сказав Єзекія до Ісаї: „Який знак, що Господь мене ви́лікує, і що я третього дня зійду́ до Господнього дому?“ І сказав Ісая: „Ось тобі знак той від Господа, що Господь зробить ту річ, про яку говорив: Чого хочеш, — щоб пішла тінь уперед на десять ступені́в, чи щоб верну́лася на десять ступені́в?“ І сказав Єзекія: „Легко тіні похили́тися вперед на десять ступені́в; ні, — а нехай тінь ве́рнеться назад на десять ступені́в!“"},"wrongAnswers":["10","20","7"],"gameTopic":"judges_kings","ladderStep":6},{"question":"Яку пророчицю Господню питав цар Йосія з Юдеї?","answer":"Гулда","categories":["old_testament","prophets","kings_judges"],"reference":"2 Kings 22:14-16","reference_uk":"2-а царiв 22:14","ogienko":{"loc":"2-а царiв 22:14","text":"І пішов священик Хілкійя, і Ахікам, і Ахбор, і Шафан, і Асая до пророчиці Хулди, жінки Шаллума, сина Тікви, сина Хархасового, сто́рожа шат, — вона сиділа в Єрусалимі, на Ново́му Місті, — і говорили до неї. А вона сказала до них: „Так говорить Господь, Бог Ізраїлів: Скажіть чоловікові, що послав вас до мене: Так говорить Господь: Ось Я наведу́ лихо на оце місце та на ме́шканців його, усі слова́ тієї книги, що читав Юдин цар, за те, що вони покинули Мене, і кадили іншим богам, щоб гніви́ти Мене всім ді́лом своїх рук. І розпали́вся Мій гнів на це місце, — і він не погасне! А Юдиному цареві, що послав вас звернутися до Господа, скажете йому так: Так говорить Господь, Бог Ізраїлів, — ті слова́, які ти чув:"},"wrongAnswers":["Міріам","Девора","Анна"],"gameTopic":"judges_kings","ladderStep":8},{"question":"Яке свято відновив цар Йосія, чого не робили попередні царі?","answer":"Пасха","categories":["old_testament","kings_judges"],"reference":"2 Kings 23:21","reference_uk":"2-а царiв 23:21","ogienko":{"loc":"2-а царiв 23:21","text":"І наказав цар усьому наро́дові, говорячи: „Справте Пасху для Господа, вашого Бога, як написано в оцій Книзі Заповіту“. Бо не справля́лася ця Пасха від днів суддів, що судили Ізраїля, по всі дні царів Ізраїлевих та царів Юдиних. І тільки вісімнадцятого року царя Йосії справлялася Пасха для Господа в Єрусалимі. А також викликачів духів померлих, і духів віщих, і домови́х божків, і бовва́нів, і всякі гидо́ти, що появилися в Юдинім кра́ї та в Єрусалимі, повини́щував Йосія, щоб поставити слова Зако́ну, написані в книзі, що знайшов священик Хілкійя в Господньому домі. А такого царя, як він, не було перед ним, що наверну́вся б до Господа всім своїм серцем, і всією душею своєю, і всією силою своєю, за всім Мойсеєвим Зако́ном, і по ньому не повставав такий, як він."},"wrongAnswers":["Свято Кущів","Масляна","Ювілей"],"gameTopic":"judges_kings","ladderStep":7},{"question":"Яку жертву приніс Самуїл після повернення ковчега до Ізраїля?","answer":"Ягня","categories":["old_testament","prophets"],"reference":"1 Samuel 7:9","reference_uk":"1-а Самуїлова 7:9","ogienko":{"loc":"1-а Самуїлова 7:9","text":"І взяв Самуїл одне моло́чне ягня́, і приніс його повним цілопа́ленням для Господа. І кли́кав Самуїл до Господа за Ізраїля, а Господь відповів йому. І прино́сив Самуїл цілопа́лення, а филисти́мляни приступи́ли до бо́ю проти Ізраїля. І загримів Госпо́дь того дня сильним громом на филисти́млян, та й привів їх у замі́шання, — і були́ вони побиті перед Ізраїлем. І повихо́дили Ізраїлеві люди з Міцпи́, та й гнали филисти́млян, і били їх аж під Бет-Кар. І взяв Самуїл одного ка́меня, і поклав між Міцпою та між Шенам, та й назвав ім'я́ йому: Евен-Єзер.[12] І він сказав: „Аж доти допоміг нам Господь“. І були филистимляни перемо́жені, і далі вже не вхо́дили в Ізраїлеві границі. І була Господня рука на филисти́млянах за всі дні Самуїлові."},"wrongAnswers":["Тільця","Барана","Голуба"],"gameTopic":"prophets","ladderStep":7},{"question":"Як звали першого сина Самуїла?","answer":"Йоїл","categories":["old_testament","prophets"],"reference":"1 Samuel 8:2","reference_uk":"1-а Самуїлова 8:2","ogienko":{"loc":"1-а Самуїлова 8:2","text":"І було ім'я́ перворі́дного сина його Йоїл, а ім'я́ другого його — Авійя, судді в Беер-Шеві. А сини його не йшли його дорогою, — і вхиля́лись до зи́ску, і брали пі́дкупа, і ламали Зако́на. І зібралися всі Ізраїлеві старші́, і прийшли до Самуїла до Рами́, та й сказали до нього: „Ось ти поста́рівся, а сини твої не йдуть доро́гами твоїми. Тепер настанови́ нам царя́, щоб судив нас, як у всіх наро́дів“. І була та річ зла в Самуїлових оча́х, як вони сказали: „Настанови́ нам царя́, щоб судив нас“. І молився Самуїл до Господа."},"wrongAnswers":["Авія","Авінадав","Самуїл"],"gameTopic":"prophets","ladderStep":8},{"question":"З якого коліна Ізраїля походив цар Саул?","answer":"Веніямин","categories":["old_testament","kings_judges"],"reference":"1 Samuel 9:21","reference_uk":"1-а Самуїлова 9:21","ogienko":{"loc":"1-а Самуїлова 9:21","text":"І відповів Саул та й сказав: „Чи ж я не веніями́нівець, із найменших Ізраїлевих племен? А рід мій найменший з усіх родів Веніями́нового пле́мени. І чого ти говориш мені отаке слово?“ І взяв Самуїл Саула та слугу його, і ввів їх до кімна́ти, і дав їм місце на чолі́ покли́каних, а тих було близько тридцяти́ чоловіка. І сказав Самуїл до ку́харя: „Дай же ту ча́стку, що дав я тобі, що про неї я сказав тобі: Відклади її в себе!“ І подав ку́хар стегно́ та те, що на ньому, і поклав перед Саулом. А Самуїл сказав: „Оце позоста́влене! Поклади перед собою та їж, бо воно схо́ване для тебе на умо́влений час, коли я сказав: Покликав я наро́д“. І Саул їв із Самуїлом того дня. І зійшли вони з па́гірка до міста, і він розмовляв із Саулом на даху́ свого дому."},"wrongAnswers":["Юда","Єфрем","Манасія"],"gameTopic":"judges_kings","ladderStep":6},{"question":"Як звали дружину царя Саула?","answer":"Ахіноам","categories":["old_testament","kings_judges"],"reference":"1 Samuel 14:50","reference_uk":"1-а Самуїлова 14:50","ogienko":{"loc":"1-а Самуїлова 14:50","text":"А ім'я́ Саулової жінки: Ахіноам, дочка Ахіма́аца. А ім'я́ провідника́ його ві́йська: Авне́р, син Нера, Саулового дя́дька. А Кіш — батько Саулів, а Нер — батько Авнера, син Авіїлів. І була сильна війна на филисти́млян за всіх Саулових днів. І коли Саул бачив якого чоловіка хороброго та якого сильного, то брав його до се́бе."},"wrongAnswers":["Міхал","Авігаїла","Версаія"],"gameTopic":"judges_kings","ladderStep":5},{"question":"Що потрібно людині, щоб зрозуміти Боже Слово?","answer":"Дух Святий","categories":["new_testament"],"reference":"1 Corinthians 2:11","reference_uk":"1-е до коринтян 2:11","ogienko":{"loc":"1-е до коринтян 2:11","text":"Хто бо з людей знає речі лю́дські, окрім лю́дського духа, що в нім проживає? Так само не знає ніхто й речей Божих, окрім Духа Божого. А ми прийняли́ духа не світу, але Духа, що з Бога,[2] щоб знати про речі, від Бога даро́вані нам, що й говоримо не ви́вченими словами лю́дської мудрости, але ви́вченими від Духа Святого, порі́внюючи духовне до духовного. А люди́на тіле́сна не приймає речей, що від Божого Духа, бо їй це глупо́та, і вона зрозуміти їх не може, бо вони розуміються тільки духовно. Духовна ж люди́на су́дить усе, а її судити не може ніхто."},"wrongAnswers":["Мудрість людська","Сила ангелів","Чистий розум"],"gameTopic":"nt_general","ladderStep":4},{"question":"Кого Павло назвав своїм суддею?","answer":"Бога","categories":["new_testament"],"reference":"1 Corinthians 4:4","reference_uk":"1-е до коринтян 4:4","ogienko":{"loc":"1-е до коринтян 4:4","text":"Я бо проти себе нічого не знаю, але цим не випра́вдуюсь; Той же, Хто судить мене, то Госпо́дь. Тому́ не судіть передчасно нічо́го, аж поки не при́йде Госпо́дь, що й ви́світлить таємниці те́мряви та виявить за́думи серде́ць, і тоді кожному бу́де похвала́ від Бога. Оце ж усе, браття, приклав я до себе й Аполло́са ради вас, щоб від нас ви навчилися ду́мати „не більш, як написано“, щоб ви не чва́нились один за о́дним перед іншим. Хто бо тебе вирізня́є? Що́ ти маєш, чого б ти не взяв? А коли ж бо ти взяв, чого чва́нишся, ніби не взяв? Ви вже нагодовані, ви вже збагати́лися, без нас ви царюєте. І коли б то ви стали царюва́ти, щоб і ми царювали з вами!"},"wrongAnswers":["Христа","Церкву","Святого Духа"],"gameTopic":"nt_general","ladderStep":6},{"question":"Що відкладене робить серце важким?","answer":"Надія","categories":["old_testament","proverbs"],"reference":"Proverbs 13:12","reference_uk":"Приповiстi 13:12","ogienko":{"loc":"Приповiстi 13:12","text":"Задовга надія — неду́га для серця, а бажа́ння, що спо́внюється, — це дерево життя. Хто пого́рджує словом Господнім, той шкодить собі, хто ж страх має до заповіді, тому надолу́житься. Наука премудрого — крини́ця життя, щоб віддали́тися від пасток сме́рти. Добрий розум прино́сить приємність, а дорога зрадли́вих — погу́ба для них. Кожен розумний за мудрістю робить, а безу́мний глупо́ту показує."},"wrongAnswers":["Страх","Туга","Радість"],"gameTopic":"books","ladderStep":7},{"question":"У день П’ятдесятниці з неба долинув звук ніби … раптова?","answer":"Буря","categories":["new_testament","miracles"],"reference":"Acts 2:2","reference_uk":"Дiї 2:2","ogienko":{"loc":"Дiї 2:2","text":"І на́гло зчинився шум із не́ба, ніби буря рапто́ва зірва́лася, і перепо́внила ввесь той дім, де сиділи вони. І з'явилися їм язи́ки поді́лені, немов би огне́нні, та й на кожному з них по одно́му осів. Усі ж вони спо́внились Духом Святим, і почали́ говорити іншими мо́вами, як їм Дух промовляти давав. Перебува́ли ж в Єрусалимі юдеї, люди побожні, від усякого наро́ду під небом. А коли оцей го́мін зчинився, зібралася бе́зліч наро́ду, — та й диву далися, бо кожен із них тут почув, що вони розмовляли їхньою власною мовою!"},"wrongAnswers":["Вода","Злива","Вістка"],"gameTopic":"miracles","ladderStep":6},{"question":"Хто запропонував гроші за силу давати Духа Святого?","answer":"Симон","categories":["new_testament"],"reference":"Acts 8 (Simon the Sorcerer)","reference_uk":"Дiї 8:1","ogienko":{"loc":"Дiї 8:1","text":"А Савл похваляв його вби́вство. І утиск великий постав того дня проти єрусалимської Церкви, і всі, крім апо́столів, розпоро́шилися по краях юдейських та самарійських. І поховали Степа́на му́жі побожні, і плакали ревно за ним. А Савл нищив Церкву, — вдирався в доми́, витягав чоловіків і жінок та давав до в'язниці. Ходили тоді розпоро́шенці,[16] та Боже Слово благовісти́ли. Ось Пилип прийшов до самарійського міста, і проповідував їм про Христа."},"wrongAnswers":["Ананій","Симеон","Стефан"],"gameTopic":"nt_general","ladderStep":5},{"question":"Коли Ісус перетворив воду на вино, кам’яні посудини були для чого зазвичай призначені?","answer":"Обмивання за обрядом","categories":["new_testament","miracles"],"reference":"John 2:6","reference_uk":"Вiд Івана 2:6","ogienko":{"loc":"Вiд Івана 2:6","text":"Було тут шість камінних посу́дин на воду, що стояли для очи́щення юдейського, що відер по дві чи по три вміщали. Ісус каже до слуг: „Напо́вніть водою посу́дини“. І їх поналива́ли вще́рть. І Він каже до них: „Тепер зачерпні́ть, і занесіть до весільного ста́рости“. І занесли. Як весільний же ста́роста скуштува́в воду, що сталась вином, а він не знав, звідки воно, — знали ж слу́ги, що води наливали, — то староста кличе тоді молодо́го та й каже йому: „Кожна люди́на подає перше добре вино, а як понапива́ються, тоді гірше; а ти добре вино аж на досі зберіг“."},"wrongAnswers":["Збирання данини","Спільна трапеза","Зберігання збіжжя"],"gameTopic":"miracles","ladderStep":6},{"question":"Скільки книг Нового Завіту мають «Іван» у назві?","answer":"4","categories":["new_testament","letter_of_paul"],"reference":"John, 1 John, 2 John, 3 John","reference_uk":null,"ogienko":{"loc":"Вiд Івана 1:1-8","text":"На початку було Слово, а Слово в Бога було́, і Бог було Слово. Воно в Бога було на поча́тку. Усе через Нього повста́ло, і ніщо, що повста́ло, не повстало без Ньо́го. І життя було в Нім, а життя було Світлом людей. А Світло у те́мряві світить, і те́мрява не обгорну́ла його. Був один чоловік, що від Бога був по́сланий, — йому йме́ння Іван. Він прийшов на свідо́цтво, щоб засві́дчити про Світло, щоб повірили всі через нього. Він тим Світлом не був, але сві́дчити мав він про Світло."},"wrongAnswers":["3","5","2"],"gameTopic":"letters_paul","ladderStep":5},{"question":"Як звали трьох синів Ноя в тому порядку, як їх перелічено в Писанні?","answer":"Сим, Хам і Яфет","categories":["old_testament"],"reference":"Genesis 9:18-19, 1 Chronicles 1:4","reference_uk":"Буття 9:18","ogienko":{"loc":"Буття 9:18","text":"І були сини Ноєві, що вийшли з ковчегу: Сим, і Хам, і Яфе́т. А Хам — він був батько Ханаанів. Оці троє були сини Ноєві, і від них залю́днилася вся земля. І зачав був Ной, муж землі, садити виноград. І пив він вино та й упився, й обнажився в сере́дині свого намету. І побачив Хам, батько Ханаанів, наготу батька свого, та й розказав обом браттям своїм надво́рі."},"wrongAnswers":["Хам, Сим і Яфет","Яфет, Хам і Сим","Яфет, Сим і Хам"],"gameTopic":"ot_general","ladderStep":4},{"question":"Хто був батьком Німрода?","answer":"Куш","categories":["old_testament"],"reference":"1 Chronicles 1:10","reference_uk":"1-а хронiки 1:10","ogienko":{"loc":"1-а хронiки 1:10","text":"А Куш породи́в Німрода, — він зачав бути ве́летом на землі. А Міцраїм породив лудян, і анам'ян, і легав'ян, і нафтух'ян, і патрусян, і каслух'ян, що вийшли звідти филисти́мляни, і кафторян. А Ханаан породив Сидона, свого первородженого, і Хета, і євусеянина, і амореянина, і ґірґашеянина,"},"wrongAnswers":["Хам","Мізраїм","Єгипет"],"gameTopic":"ot_general","ladderStep":8},{"question":"Як звали двох синів Авраама за порядком народження?","answer":"Ізмаїл і Ісак","categories":["old_testament"],"reference":"Genesis 16:1-16, 21:1-7, 1 Chronicles 1:28","reference_uk":"Буття 16:1","ogienko":{"loc":"Буття 16:1","text":"А Сара, Аврамова жінка, не родила йому. І в неї була́ єги́птянка невільниця, а ймення їй Аґар. І сказала Сара Аврамові: „Ось Господь затримав мене від породу. Прийди ж до моєї невільниці, — може від неї одержу я сина“. І послухався Аврам голосу Сари. І взяла Сара, Аврамова жінка, єгиптянку Аґар, свою невільницю, по десяти літах перебува́ння Аврамового в землі ханаанській, і дала її Аврамові, чоловікові своєму, за жінку. І він увійшов до Аґари, — і вона зачала́. Як вона ж побачила, що зачала, то стала легковажити господиню свою. І сказала Сара Аврамові: „Моя кривда на тобі! Я дала була свою невільницю до лоня твого, а як вона побачила, що зачала, то стала легковажити мене. Нехай розсудить Господь поміж мною та поміж тобою!“"},"wrongAnswers":["Ісак і Ізмаїл","Ісав і Ісак","Ізмаїл і Ісав"],"gameTopic":"ot_general","ladderStep":6},{"question":"Як звали Авраама до зміни імені на дев’яносто дев’ятому році?","answer":"Аврам","categories":["old_testament"],"reference":"Genesis 17:1-5","reference_uk":"Буття 17:1","ogienko":{"loc":"Буття 17:1","text":"І був Аврам віку дев'ятидесяти літ і дев'яти літ, коли явився Господь Аврамові та й промовив до нього: „Я Бог Всемогутній! Ходи перед лицем Моїм, і будь непорочний! І дам Я Свого заповіта поміж Мною та поміж тобою, і дуже-дуже розмножу тебе“. І впав Аврам на обличчя своє, а Бог до нього промовляв, говорячи: „Я, — ось Мій заповіт із тобою, і станеш ти батьком багатьох наро́дів. І не буде вже кли́катись ім'я твоє: Аврам, але буде ім'я твоє: Авраа́м,[51] бо вчинив Я тебе батьком багатьох народів."},"wrongAnswers":["Терах","Авраам","Агар"],"gameTopic":"ot_general","ladderStep":2},{"question":"Скільки років було Авраамові, коли народився Ісак? (повтор у базі)","answer":"100","categories":["old_testament"],"reference":"Genesis 21:5","reference_uk":"Буття 21:5","ogienko":{"loc":"Буття 21:5","text":"А Авраам був віку ста літ, як уродився йому Ісак, син його. І промовила Сарра: „Сміх учинив мені Бог, — кожен, хто почує, буде сміятися з мене“. І промовила: „Хто б сказав Авраамові: Сарра годує синів? Бо вродила я сина в старості його“. І дитина росла, і була відлучена. І справив Авраам велику гостину в день відлучення Ісака. І побачила Сарра сина Аґари єги́птянки, що вродила була Авраамові, що він насміхається."},"wrongAnswers":["99","90","110"],"gameTopic":"ot_general","ladderStep":6},{"question":"Як звали першу людину, яку створив Бог?","answer":"Адам","categories":["old_testament"],"reference":"Genesis 2:7","reference_uk":"Буття 2:7","ogienko":{"loc":"Буття 2:7","text":"І створив Господь Бог людину з земного пороху, і дихнув їй у ніздрі дихання життя, і стала людина живою душею."},"wrongAnswers":["Енох","Авель","Ной"],"gameTopic":"ot_general","ladderStep":1},{"question":"Хто збудував ковчег, щоб врятуватися від потопу?","answer":"Ной","categories":["old_testament"],"reference":"Genesis 6:13-14","reference_uk":"Буття 6:13-14","ogienko":{"loc":"Буття 6:13-14","text":"І сказав Бог до Ноя: Кінець усякого тіла прийшов перед обличчя Моє... Зроби собі ковчега з дерева ґофер, зробиш у ковчезі відділи, і вимажеш його смолою всередині та знадвору."},"wrongAnswers":["Авраам","Мойсей","Лот"],"gameTopic":"ot_general","ladderStep":2},{"question":"Як звали брата Мойсея, який допомагав йому говорити до фараона?","answer":"Аарон","categories":["old_testament"],"reference":"Exodus 4:14","reference_uk":"Вихід 4:14","ogienko":{"loc":"Вихід 4:14","text":"І запалився гнів Господній на Мойсея, і Він сказав: Хіба не є Аарон, левит, брат твій? Я знаю, що він гарно говорить. І ось він виходить тобі назустріч, і побачить тебе, і буде радіти в серці своїм."},"wrongAnswers":["Йосип","Каїн","Ісак"],"gameTopic":"ot_general","ladderStep":3},{"question":"Кого переміг Давид за допомогою пращі та каменя?","answer":"Голіафа","categories":["old_testament"],"reference":"1 Samuel 17:50","reference_uk":"1 Самуїлова 17:50","ogienko":{"loc":"1 Самуїлова 17:50","text":"І переміг Давид то
